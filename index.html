<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>노원다인치과병원 포털</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Supabase 직접 호출 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        [x-cloak] { display: none !important; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; overflow: visible !important; height: auto !important; }
            .print-hide { display: none !important; }
            .print-container { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; overflow: visible !important; zoom: 0.9; }
            table { width: 100% !important; table-layout: fixed !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .print-show-all { max-height: none !important; overflow: visible !important; display: table-row-group !important; }
        }
        
        .admin-compact td, .admin-compact th { padding: 4px 6px; font-size: 13px; }
        .table-wrapper { overflow-x: auto; overflow-y: auto; position: relative; max-width: 100%; height: 100%; }
        th.sticky-col { position: sticky !important; z-index: 40 !important; background-color: #f3f4f6 !important;}
        th.sticky-col.bg-blue-50 { background-color: #eff6ff !important;}
        td.sticky-col { position: sticky !important; z-index: 30 !important; background-color: #ffffff !important; }
        td.sticky-col.bg-blue-50\/40 { background-color: #eef2ff !important;}
        td:not(.sticky-col) { z-index: 0 !important; }
        
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .flex-center { display: flex; align-items: center; justify-content: center; }

        @keyframes pulse-status { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .status-pulse { animation: pulse-status 2s infinite; }
        @keyframes pulse-error { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .status-error { animation: pulse-error 2s infinite; }

        /* [요청 3] 마켓 롤링 애니메이션 CSS 리팩토링 (겹침 오류 완전 해결) */
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: max-content; animation: marquee 30s linear infinite; }
        @media (min-width: 768px) { .animate-marquee { animation: marquee 60s linear infinite; } }
        .marquee-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; display: flex; }
        
    </style>
</head>
<!-- [요청 2] 반응형 페이징 적용을 위해 리사이즈 이벤트 감지 -->
<body x-data="portalApp()" x-init="init()" @resize.window="updateLayout()" class="antialiased flex flex-col transition-colors duration-500" :class="getBgColorClass()">

    <div class="w-full bg-slate-900 text-white overflow-hidden h-8 flex items-center text-[12px] sm:text-[13px] font-bold shrink-0 z-50 print-hide relative border-b border-slate-800">
        <div class="absolute left-0 bg-slate-900 px-3 z-10 h-full flex items-center shadow-[4px_0_8px_rgba(15,23,42,1)] font-black text-blue-300">
           <i class="fa-solid fa-globe mr-1.5"></i> 실시간 마켓
        </div>
        <!-- [요청 3] HTML 구조 리팩토링 (2세트 연속 배치) -->
        <div class="marquee-container flex-1 ml-[115px]">
            <div class="animate-marquee gap-8 pr-8">
                <!-- 1번 세트 -->
                <div class="flex gap-8 shrink-0">
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">💰금(1g)</span> <span x-text="marketData.gold.toLocaleString()+'원'"></span> <span :class="marketChanges.gold.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.gold.isUp?'▲':'▼') + marketChanges.gold.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">💵환율(USD)</span> <span x-text="marketData.usd.toLocaleString()+'원'"></span> <span :class="marketChanges.usd.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.usd.isUp?'▲':'▼') + marketChanges.usd.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🛢️WTI(유가)</span> <span x-text="'$'+marketData.wti.toLocaleString()"></span> <span :class="marketChanges.wti.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.wti.isUp?'▲':'▼') + marketChanges.wti.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">📈KOSPI</span> <span x-text="marketData.kospi.toLocaleString()"></span> <span :class="marketChanges.kospi.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.kospi.isUp?'▲':'▼') + marketChanges.kospi.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🚀S&P500</span> <span x-text="marketData.sp500.toLocaleString()"></span> <span :class="marketChanges.sp500.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.sp500.isUp?'▲':'▼') + marketChanges.sp500.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🍏NASDAQ</span> <span x-text="marketData.nasdaq.toLocaleString()"></span> <span :class="marketChanges.nasdaq.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.nasdaq.isUp?'▲':'▼') + marketChanges.nasdaq.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🪙비트코인</span> <span x-text="marketData.btc.toLocaleString()+'원'"></span> <span :class="marketChanges.btc.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.btc.isUp?'▲':'▼') + marketChanges.btc.val.toLocaleString()"></span></span>
                </div>
                <!-- 2번 세트 (빈 공간 없이 이어지도록 복제) -->
                <div class="flex gap-8 shrink-0">
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">💰금(1g)</span> <span x-text="marketData.gold.toLocaleString()+'원'"></span> <span :class="marketChanges.gold.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.gold.isUp?'▲':'▼') + marketChanges.gold.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">💵환율(USD)</span> <span x-text="marketData.usd.toLocaleString()+'원'"></span> <span :class="marketChanges.usd.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.usd.isUp?'▲':'▼') + marketChanges.usd.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🛢️WTI(유가)</span> <span x-text="'$'+marketData.wti.toLocaleString()"></span> <span :class="marketChanges.wti.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.wti.isUp?'▲':'▼') + marketChanges.wti.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">📈KOSPI</span> <span x-text="marketData.kospi.toLocaleString()"></span> <span :class="marketChanges.kospi.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.kospi.isUp?'▲':'▼') + marketChanges.kospi.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🚀S&P500</span> <span x-text="marketData.sp500.toLocaleString()"></span> <span :class="marketChanges.sp500.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.sp500.isUp?'▲':'▼') + marketChanges.sp500.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🍏NASDAQ</span> <span x-text="marketData.nasdaq.toLocaleString()"></span> <span :class="marketChanges.nasdaq.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.nasdaq.isUp?'▲':'▼') + marketChanges.nasdaq.val"></span></span>
                    <span class="whitespace-nowrap tracking-wide"><span class="text-gray-400 font-medium">🪙비트코인</span> <span x-text="marketData.btc.toLocaleString()+'원'"></span> <span :class="marketChanges.btc.isUp ? 'text-red-400' : 'text-blue-400'" x-text="(marketChanges.btc.isUp?'▲':'▼') + marketChanges.btc.val.toLocaleString()"></span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- [관리자 모드] -->
    <main class="flex-grow flex flex-col h-[calc(100vh-2rem)] bg-[#f8fafc] relative z-50 print-hide overflow-hidden" x-show="isAdminMode" x-cloak>
        <div class="bg-slate-900 text-white px-4 py-3 flex items-center justify-between shrink-0 shadow-md z-30 h-14">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 rounded-full bg-blue-600 flex-center shadow-inner"><i class="fa-solid fa-wrench text-[13px]"></i></div>
                <h2 class="font-black text-[15px] sm:text-[16px] tracking-tight hidden sm:block">포털 통합 관리시스템</h2>
                <h2 class="font-black text-[15px] tracking-tight sm:hidden">관리시스템</h2>
                
                <div class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10.5px] font-bold ml-2 transition-all border border-white/10"
                     :class="systemStatus === 'normal' ? 'bg-green-500/20 text-green-300' : 'bg-red-500/20 text-red-300'"
                     @click="systemStatus !== 'normal' && fetchSupabaseData()" title="클릭 시 강제 재연동">
                    <div class="w-2 h-2 rounded-full" :class="systemStatus === 'normal' ? 'bg-green-400 status-pulse' : 'bg-red-400 status-error'"></div>
                    <span x-text="systemStatus === 'normal' ? '서버 100% 동기화' : '연동 끊김 (자동복구중)'"></span>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="saveData()" class="px-3 sm:px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-[12.5px] font-bold shadow-sm transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden sm:inline">전체 저장</span><span class="sm:hidden">저장</span>
                </button>
                <button @click="adminLogout" class="px-3 sm:px-4 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-[12.5px] font-bold shadow-sm transition-colors">나가기</button>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row flex-1 overflow-hidden min-h-0">
            <div class="w-full sm:w-48 bg-white border-b sm:border-r border-gray-200 shadow-[2px_0_8px_rgba(0,0,0,0.02)] shrink-0 z-20 relative flex flex-col">
                <div class="sm:hidden absolute top-0 right-0 bottom-0 w-6 bg-gradient-to-l from-white to-transparent pointer-events-none z-10"></div>
                <div class="flex flex-row sm:flex-col overflow-x-auto sm:overflow-y-auto hide-scrollbar w-full p-1.5 sm:p-0 sm:py-3 gap-1.5 sm:gap-0 snap-x">
                    <template x-for="tab in adminTabs" :key="tab.id">
                        <button @click="adminTab = tab.id" 
                                class="shrink-0 snap-start text-center sm:text-left px-3 sm:px-4 py-2 sm:py-3.5 text-[12.5px] sm:text-[14px] font-bold transition-all relative flex flex-row items-center justify-center sm:justify-start gap-1.5 sm:gap-3 rounded-lg sm:rounded-none whitespace-nowrap"
                                :class="adminTab === tab.id ? 'text-blue-700 bg-blue-50 border border-blue-100 sm:border-none' : 'text-gray-500 hover:bg-gray-50 border border-gray-200 sm:border-transparent'"
                                :title="tab.name">
                            <i :class="tab.icon" class="w-4 text-center text-[13px] sm:text-[15px]" :class="adminTab === tab.id ? 'text-blue-600' : 'text-gray-400'"></i>
                            <span x-text="tab.name"></span>
                            <div x-show="adminTab === tab.id" class="hidden sm:block absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r-md shadow-[1px_0_4px_rgba(37,99,235,0.4)]"></div>
                        </button>
                    </template>
                </div>
                <div class="sm:hidden text-center text-[10px] text-gray-400 font-medium pb-1 tracking-tight"><i class="fa-solid fa-arrows-left-right text-[9px] mr-1"></i>좌우로 스와이프하여 메뉴 이동</div>
            </div>

            <div class="flex-1 overflow-y-auto p-2 sm:p-4 relative hide-scrollbar">
                
                <template x-if="adminTab === 'schedule_edit'">
                    <div class="space-y-3 max-w-[1400px] w-full mx-auto flex flex-col h-full pb-4 px-1">
                        <div class="bg-blue-50/50 border border-blue-200 rounded-xl p-3 shadow-sm shrink-0 flex flex-col cursor-pointer sm:cursor-auto transition-colors hover:bg-blue-50" @click="showAdminScheduleLegend = !showAdminScheduleLegend">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <i class="fa-solid fa-circle-info text-blue-500 text-[15px]"></i>
                                    <h4 class="font-bold text-blue-800 text-[14.5px]">통합 스케줄 편집기 <span class="sm:hidden text-[11px] text-blue-500 font-medium ml-1" x-text="showAdminScheduleLegend ? '(터치하여 숨기기)' : '(터치하여 펼치기)'"></span></h4>
                                </div>
                                <i class="fa-solid text-blue-400 sm:hidden" :class="showAdminScheduleLegend ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                            </div>
                            <div x-show="showAdminScheduleLegend" class="mt-2 pl-6">
                                <p class="text-[13px] text-blue-600 leading-snug mb-2 break-keep">모든 직군의 스케줄을 한눈에 확인하고 클릭만으로 빠르게 수정할 수 있습니다.<br>※ 달력 관리에서 지정한 <strong class="text-red-500">휴무일은 자동으로 빨간색 '휴무'로 표기</strong>됩니다.</p>
                                <div class="flex flex-wrap gap-1.5 pt-2 border-t border-blue-200/50 items-center">
                                    <span class="text-[12.5px] font-bold text-blue-800 mr-1"><i class="fa-solid fa-tags text-blue-500 mr-1"></i> 현재 등록된 범례:</span>
                                    <template x-for="type in (data.shiftTypes || []).filter(t => t.code !== '' && t.code !== '정상')" :key="'leg_show_'+type.code">
                                        <span class="text-[11.5px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-black/5" :class="type.color + ' ' + type.bgText" x-text="type.code + (type.label ? `(${type.label})` : '')"></span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 overflow-hidden admin-compact relative min-h-0">
                            <div class="p-2.5 border-b border-gray-100 flex items-center justify-between bg-gray-50 shrink-0 z-20 flex-wrap gap-2">
                                <div class="flex items-center gap-2">
                                    <div class="flex gap-1 bg-white border border-gray-200 rounded-lg shadow-sm">
                                        <button @click="changeMonth(-1)" class="w-8 h-8 hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-left text-[13px]"></i></button>
                                        <div class="w-24 flex-center font-black text-[14.5px] text-gray-800 border-x border-gray-100" x-text="`${currentYear}년 ${currentMonth}월`"></div>
                                        <button @click="changeMonth(1)" class="w-8 h-8 hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-right text-[13px]"></i></button>
                                    </div>
                                    <select x-model="selectedGroup" @change="adminSchedulePage = 1" class="bg-white border border-gray-300 text-gray-700 text-[13.5px] rounded-lg focus:ring-blue-500 px-3 py-1.5 font-bold shadow-sm outline-none cursor-pointer">
                                        <option value="전체">전체 직군 보기</option>
                                        <template x-for="g in (data.groups || [])" :key="g"><option :value="g" x-text="g"></option></template>
                                    </select>
                                </div>
                                <button @click="downloadExcel('schedule')" class="px-3 py-1.5 text-[12.5px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 flex items-center gap-1.5 shadow-sm transition-colors hidden sm:flex"><i class="fa-solid fa-file-excel"></i> 엑셀 백업</button>
                            </div>

                            <div class="table-wrapper flex-1 p-0 hide-scrollbar relative bg-white border-b border-gray-400">
                                <table class="w-full text-center border-collapse table-fixed min-w-max border-r border-gray-400">
                                    <thead class="bg-gray-100 sticky top-0 z-30 shadow-[0_1px_2px_rgba(0,0,0,0.1)]">
                                        <tr>
                                            <th class="w-[26px] min-w-[26px] md:w-[35px] md:min-w-[35px] border-b border-r border-t border-l border-gray-400 text-gray-700 font-bold sticky left-0 sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] text-[11px] md:text-[13px] py-2 z-40">No</th>
                                            <th class="w-[50px] min-w-[50px] md:w-[75px] md:min-w-[75px] border-b border-r border-t border-gray-400 text-gray-700 font-bold sticky left-[26px] md:left-[35px] sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] whitespace-nowrap text-[11.5px] md:text-[13.5px] py-2 z-40">직군</th>
                                            <th class="w-[50px] min-w-[50px] md:w-[65px] md:min-w-[65px] border-b border-r border-t border-gray-400 text-gray-700 font-bold sticky left-[76px] md:left-[110px] sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] whitespace-nowrap text-[11.5px] md:text-[13.5px] py-2 z-40">이름</th>
                                            <!-- [요청 4] 관리자모드 잔여연차 잘림 최적화 -->
                                            <th class="w-[36px] min-w-[36px] md:w-[50px] md:min-w-[50px] border-b border-r-2 border-t border-gray-500 text-blue-700 font-bold sticky left-[126px] md:left-[175px] sticky-col bg-blue-50 shadow-[2px_0_0_#64748b] text-[9.5px] sm:text-[10px] md:text-[12.5px] py-2 leading-tight z-40 px-0.5 tracking-tighter" style="background-color: #eff6ff !important; word-break: keep-all;">잔여<br>연차</th>
                                            
                                            <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_th_'+dateObj.id">
                                                <th class="w-[32px] md:w-[34px] min-w-[32px] md:min-w-[34px] border-b border-r border-t border-gray-400 py-1" :class="isHoliday(dateObj.dateStr) ? 'bg-red-50/50' : ''">
                                                    <div class="text-[11px] md:text-[13px] font-black leading-none" :class="dateObj.isSun ? 'text-red-600' : (dateObj.isSat ? 'text-blue-600' : 'text-gray-800')" x-text="dateObj.day"></div>
                                                    <div class="text-[9px] md:text-[10px] text-gray-600 font-medium mt-0.5" x-text="dateObj.dayName"></div>
                                                </th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody class="print-show-all">
                                        <template x-for="(emp, index) in paginatedAdminSchedules" :key="'adm_emp_'+emp.id">
                                            <tr class="hover:bg-blue-50/30 transition-colors border-b border-gray-300">
                                                <td class="border-r border-l border-gray-400 text-[10.5px] md:text-[12.5px] font-bold text-gray-500 sticky left-0 sticky-col bg-white shadow-[1px_0_0_#94a3b8] text-center py-2 z-20" x-text="(adminSchedulePage - 1) * adminScheduleItemsPerPage + index + 1"></td>
                                                <td class="border-r border-gray-400 text-[11px] md:text-[13px] font-medium text-gray-700 sticky left-[26px] md:left-[35px] sticky-col bg-white shadow-[1px_0_0_#94a3b8] whitespace-nowrap py-2 z-20 truncate-text px-1 text-center" x-text="emp.group"></td>
                                                <td class="font-black text-[11.5px] md:text-[13.5px] text-gray-800 border-r border-gray-400 sticky left-[76px] md:left-[110px] sticky-col bg-white shadow-[1px_0_0_#94a3b8] whitespace-nowrap py-2 z-20 truncate-text px-1 text-center" x-text="emp.name"></td>
                                                <!-- [요청 4] 관리자모드 잔여연차 숫자 사이즈 최적화 -->
                                                <td class="font-black text-[10px] md:text-[13px] text-blue-700 border-r-2 border-gray-500 sticky left-[126px] md:left-[175px] sticky-col bg-blue-50/40 shadow-[2px_0_0_#64748b] text-center py-2 z-20 px-0.5 tracking-tighter" style="background-color: #eef2ff !important;" x-text="getRemainLeaves(emp)"></td>
                                                
                                                <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_td_'+emp.id+'_'+dateObj.id">

                simulateMarket() {
                    setInterval(() => {
                        const fluctuate = (val, volatility, isInt = false) => {
                            const change = val * volatility * (Math.random() - 0.5);
                            let newVal = val + change;
                            return isInt ? Math.round(newVal) : parseFloat(newVal.toFixed(2));
                        };
                        
                        this.marketData.gold = fluctuate(this.marketData.gold, 0.0001, true);
                        this.marketData.usd = fluctuate(this.marketData.usd, 0.0002);
                        this.marketData.wti = fluctuate(this.marketData.wti, 0.0003);
                        this.marketData.kospi = fluctuate(this.marketData.kospi, 0.0002);
                        this.marketData.sp500 = fluctuate(this.marketData.sp500, 0.0002);
                        this.marketData.nasdaq = fluctuate(this.marketData.nasdaq, 0.0002);
                        this.marketData.btc = fluctuate(this.marketData.btc, 0.0005, true);
                        
                        this.marketChanges.gold.isUp = Math.random() > 0.5;
                        this.marketChanges.usd.isUp = Math.random() > 0.5;
                        this.marketChanges.wti.isUp = Math.random() > 0.5;
                        this.marketChanges.kospi.isUp = Math.random() > 0.5;
                        this.marketChanges.sp500.isUp = Math.random() > 0.5;
                        this.marketChanges.nasdaq.isUp = Math.random() > 0.5;
                        this.marketChanges.btc.isUp = Math.random() > 0.5;
                    }, 2500); 
                },

                async trackVisitRealtime() {
                    let kstDate = new Intl.DateTimeFormat('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
                    let today = kstDate.replace(/\. /g, '-').replace('.', '');
                    let hasVisitedToday = sessionStorage.getItem('visited_' + today);
                    
                    if (!isDbConnected || !supabaseClient) return;

                    try {
                        const { data: currentStats } = await supabaseClient
                            .from('portal_data')
                            .select('data')
                            .eq('id', 'stats_v4')
                            .single();
                            
                        let stats = currentStats ? currentStats.data : { total: 0, today: 0, date: today };
                        
                        if (stats.date !== today) {
                            stats.today = 0;
                            stats.date = today;
                        }

                        if (!hasVisitedToday) {
                            stats.total = (stats.total || 0) + 1;
                            stats.today = (stats.today || 0) + 1;
                            
                            await supabaseClient.from('portal_data').upsert({ id: 'stats_v4', data: stats });
                            sessionStorage.setItem('visited_' + today, 'true');
                        }
                        
                        this.todayVisits = stats.today || 0;
                        this.totalVisits = stats.total || 0;

                    } catch(e) { 
                        let stats = JSON.parse(localStorage.getItem('ndain_stats_v4') || '{"total":0, "today":0, "date":""}');
                        if(stats.date !== today) { stats.today = 0; stats.date = today; }
                        
                        if (!hasVisitedToday) {
                            stats.today += 1;
                            stats.total += 1;
                            localStorage.setItem('ndain_stats_v4', JSON.stringify(stats));
                            sessionStorage.setItem('visited_' + today, 'true');
                        }
                        this.todayVisits = stats.today;
                        this.totalVisits = stats.total;
                    }
                },

                async fetchSupabaseData(isSilent = false) {
                    if (!isDbConnected || !supabaseClient) return;
                    try {
                        const { data, error } = await supabaseClient
                            .from('portal_data')
                            .select('data')
                            .eq('id', 'master_v4')
                            .single();
                        
                        if (error && error.code !== 'PGRST116') throw error;
                        
                        if (data && data.data) {
                            if (!this.isAdminMode) {
                                this.mergeData(data.data);
                            }
                            if (!isSilent) this.systemStatus = 'normal';
                        }
                    } catch (e) {
                        if (!isSilent) this.systemStatus = 'error';
                    }
                },

                    const dayNames = ['일','월','화','수','목','금','토'];
                    for (let i = 1; i <= lastDate; i++) {
                        let dateObj = new Date(this.currentYear, this.currentMonth - 1, i);
                        let dateStr = `${this.currentYear}-${String(this.currentMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                        days.push({ id: `d_${i}`, dateStr: dateStr, day: i, dayName: dayNames[dateObj.getDay()], isSun: dateObj.getDay() === 0, isSat: dateObj.getDay() === 6 });
                    }
                    this.calendarDays = days;
                },
                changeMonth(delta) {
                    this.currentMonth += delta;
                    if (this.currentMonth > 12) { this.currentMonth = 1; this.currentYear++; } 
                    else if (this.currentMonth < 1) { this.currentMonth = 12; this.currentYear--; }
                    this.generateCalendar();
                },

                isHoliday(dateStr) {
                    if (!dateStr) return false;
                    if ((this.data.customHolidays || []).includes(dateStr)) return true;
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) return true;
                    return false;
                },
                toggleHoliday(dateStr) {
                    if(!this.data.customHolidays) this.data.customHolidays = [];
                    let idx = this.data.customHolidays.indexOf(dateStr);
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) { Swal.fire('안내', '해당 요일은 위 기본 세팅에서 체크 해제하세요.', 'info'); return; }
                    
                    if (idx > -1) this.data.customHolidays.splice(idx, 1);
                    else this.data.customHolidays.push(dateStr);
                    this.saveData('legend');
                },

                addGroup() { 
                    if(this.newGroup && !(this.data.groups||[]).includes(this.newGroup)) { 
                        this.data.groups.push(this.newGroup); 
                        this.newGroup = ''; 
                        this.saveData('emp'); 
                    } 
                },

                renameGroup(oldName, newName, idx) {
                    if(!newName || newName.trim() === '') { this.data.groups = [...this.data.groups]; return; }
                    if(this.data.groups.includes(newName) && oldName !== newName) { Swal.fire('알림', '이미 존재하는 직군입니다.', 'warning'); this.data.groups = [...this.data.groups]; return; }
                    this.data.groups[idx] = newName;
                    if(this.data.employees) {
                        this.data.employees.forEach(emp => { if(emp.group === oldName) emp.group = newName; });
                    }
                    this.saveData('emp');
                },

                addEmployee() {
                    if(!this.newEmp.group || !this.newEmp.name) { Swal.fire('알림', '직군과 이름을 입력하세요', 'warning'); return; }
                    if(!this.data.employees) this.data.employees = [];
                    this.data.employees.push({ id: 'e_' + Date.now(), ...this.newEmp });
                    this.newEmp = { group: '', name: '', joinDate: '', usedLeaves: 0 };
                    this.saveData('emp');
                },
                removeEmployee(id) { this.data.employees = (this.data.employees||[]).filter(e => e.id !== id); this.saveData('emp'); },

                calculateTotalLeaves(joinDateStr) {
                    if(!joinDateStr) return 0;
                    let jd = new Date(joinDateStr); let now = new Date();
                    if (now < jd) return 0; 
                    let yearsDiff = now.getFullYear() - jd.getFullYear();
                    if (this.data.leaveStandard === 'fiscal') {
                        if (yearsDiff === 0) {
                            let months = now.getMonth() - jd.getMonth();
                            if (now.getDate() < jd.getDate()) months--;
                            return Math.max(0, months).toFixed(1);
                        } else {
                            let daysInJoinYear = (new Date(jd.getFullYear(), 11, 31) - jd) / (1000 * 60 * 60 * 24) + 1;
                            let firstYearProrated = 15 * (daysInJoinYear / 365);
                            if (yearsDiff === 1) return firstYearProrated.toFixed(1);
                            let base = 15; let extra = Math.floor((yearsDiff - 2) / 2);
                            return Math.min(base + extra, 25).toFixed(1);
                        }
                    } else {
                        let months = yearsDiff * 12 + (now.getMonth() - jd.getMonth());
                        if (now.getDate() < jd.getDate()) months--;
                        if (months < 12) return Math.max(0, months).toFixed(1);
                        let years = Math.floor(months / 12);
                        let base = 15; let extra = Math.floor((years - 1) / 2);
                        return Math.min(base + extra, 25).toFixed(1);
                    }
                },
                calculateUsed(emp) {
                    let used = parseFloat(emp.usedLeaves || 0);
                    let currentYearStr = new Date().getFullYear().toString();
                    let todayStr = new Date().toISOString().slice(0, 10);
                    if(this.data.schedules && this.data.schedules[emp.id]) {
                        for(let date in this.data.schedules[emp.id]) {
                            if(date.startsWith(currentYearStr) && date <= todayStr) {
                                let code = this.data.schedules[emp.id][date];
                                let type = (this.data.shiftTypes||[]).find(t => t.code === code);
                                if(type && type.deduction > 0) used += parseFloat(type.deduction);
                            }
                        }
                    }
                    return used.toFixed(1);
                },
                getRemainLeaves(emp) {
                    let total = parseFloat(this.calculateTotalLeaves(emp.joinDate));
                    let used = parseFloat(this.calculateUsed(emp));
                    return (total - used).toFixed(1);
                },

                toggleScheduleCell(empId, dateStr) {
                    if(!this.data.schedules) this.data.schedules = {};
                    if(!this.data.schedules[empId]) this.data.schedules[empId] = {};
                    let currentCode = this.data.schedules[empId][dateStr] || '정상';
                    let codes = (this.data.shiftTypes || []).map(t => t.code);
                    let currentIndex = codes.indexOf(currentCode);
                    let nextIndex = (currentIndex + 1) % codes.length;
                    let nextCode = codes[nextIndex];
                    if(nextCode === '정상' || nextCode === '') {
                        delete this.data.schedules[empId][dateStr];
                    } else {
                        this.data.schedules[empId][dateStr] = nextCode;
                    }
                    this.data.schedules = JSON.parse(JSON.stringify(this.data.schedules));
                    this.saveData('schedule_edit'); 
                },
                getCellStyle(empId, dateStr) {
                    let code = (this.data.schedules && this.data.schedules[empId] && this.data.schedules[empId][dateStr]) ? this.data.schedules[empId][dateStr] : '정상';
                    let type = (this.data.shiftTypes || []).find(t => t.code === code);
                    if(type && type.code !== '정상') return { text: type.code, bgClass: type.color, textClass: type.bgText };
                    return { text: '', bgClass: 'bg-transparent', textClass: 'text-gray-800' };
                },

                getIconClass(name) {
                    let text = name || '';
                    if (text.includes('홈페이지')) return 'fa-house';
                    if (text.includes('블로그')) return 'fa-brands fa-blogger-b';
                    if (text.includes('페이스북') || text.toLowerCase().includes('facebook')) return 'fa-brands fa-facebook';
                    if (text.includes('인스타') || text.toLowerCase().includes('instagram')) return 'fa-brands fa-instagram';
                    if (text.includes('유튜브') || text.toLowerCase().includes('youtube')) return 'fa-brands fa-youtube';
                    return 'fa-link';
                },
                getShortcutStyle(btn, idx) {
                    if(btn && btn.colorId && this.shortcutColors) {
                        let found = this.shortcutColors.find(c => c.id === btn.colorId);
                        if(found) return found;
                    }
                    if(this.shortcutColors && this.shortcutColors.length > 0) {
                        return this.shortcutColors[idx % this.shortcutColors.length];
                    }
                    return { bg: 'bg-blue-500 hover:bg-blue-600', iconColor: 'text-blue-500' };
                },
                addShortcut() {
                    if(!this.data.content.shortcuts) this.data.content.shortcuts = [];
                    let usedColors = this.data.content.shortcuts.map(s => s.colorId);
                    let available = this.shortcutColors.filter(c => !usedColors.includes(c.id));
                    let nextColor = available.length > 0 ? available[0].id : this.shortcutColors[0].id;

                    this.data.content.shortcuts.push({name: '', url: '', colorId: nextColor});
                    this.saveData('content');
                },

                uploadLogoFile(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    if(file.size > 1024 * 1024) { Swal.fire('용량 초과', '1MB 이하의 이미지만 가능합니다.', 'warning'); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        if(!this.data.content) this.data.content = {};
                        this.data.content.customLogo = ev.target.result;
                        this.saveData('content');
                    };
                    reader.readAsDataURL(file);
                },
                
                addWelfare() {
                    if(!this.newWelfare.title) { Swal.fire('알림', '복리후생 항목명을 입력해주세요.', 'warning'); return; }
                    if(!this.data.welfares) this.data.welfares = [];
                    this.data.welfares.push({ title: this.newWelfare.title, desc: this.newWelfare.desc });
                    this.newWelfare = { title: '', desc: '' };
                    this.saveData('welfare');
                },
                getWelfareIcon(title) {
                    if(!title) return 'fa-gift text-rose-500';
                    if(title.includes('휴가') || title.includes('연차')) return 'fa-umbrella-beach text-blue-500';
                    if(title.includes('지원') || title.includes('비')) return 'fa-sack-dollar text-amber-500';
                    if(title.includes('경조')) return 'fa-envelope-open-text text-purple-500';
                    if(title.includes('건강') || title.includes('의료')) return 'fa-heart-pulse text-red-500';
                    if(title.includes('교육')) return 'fa-book-open-reader text-green-500';
                    return 'fa-gift text-rose-500';
                },
                
                editFile(file, idx) {
                    this.newFile = { name: file.name, desc: file.desc };
                    this.editFileIdx = idx;
                },

                uploadFile() {
                    const input = document.getElementById('adminFileInput');
                    const file = input.files[0];
                    if(!file && !this.newFile.name) { Swal.fire('오류', '파일을 선택하거나 제목을 입력하세요.', 'warning'); return; }
                    if(file && file.size > 1024 * 1024) { Swal.fire('용량 초과', '1MB 이하의 파일만 가능합니다.', 'warning'); return; }
                    
                    let now = new Date();
                    let dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
                    
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            if(this.editFileIdx > -1) {
                                this.data.files[this.editFileIdx] = { ...this.data.files[this.editFileIdx], name: this.newFile.name || file.name, desc: this.newFile.desc, data: e.target.result, date: dateStr + ' (수정됨)' };
                                this.editFileIdx = -1;
                            } else {
                                if(!this.data.files) this.data.files = [];
                                this.data.files.unshift({ name: this.newFile.name || file.name, desc: this.newFile.desc, data: e.target.result, date: dateStr });
                            }
                            this.newFile = { name: '', desc: '' }; input.value = '';
                            this.saveData('files');
                        };
                        reader.readAsDataURL(file);
                    } else {
                        if(this.editFileIdx > -1) {
                            this.data.files[this.editFileIdx] = { ...this.data.files[this.editFileIdx], name: this.newFile.name, desc: this.newFile.desc, date: dateStr + ' (수정됨)' };
                            this.editFileIdx = -1;
                        } else {
                            if(!this.data.files) this.data.files = [];
                            this.data.files.unshift({ name: this.newFile.name, desc: this.newFile.desc, data: null, date: dateStr });
                        }
                        this.newFile = { name: '', desc: '' }; input.value = '';
                        this.saveData('files');
                    }
                },
                downloadFile(f) {
                    if(!f.data) { Swal.fire('안내', '텍스트 전용 게시물입니다.', 'info'); return; }
                    let a = document.createElement('a'); a.href = f.data; a.download = f.name; 
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                },

                openQaWriteModal() { this.qaModalMode = 'new'; this.newQa = { id:'', no:'', title:'', content:'', name:'', pwd:'', fileName:'', fileData:'', date:'' }; this.qaVerifyPwd = ''; this.openQaModal = true; },
                openQaViewModal(qa) { this.qaModalMode = 'view'; this.newQa = JSON.parse(JSON.stringify(qa)); this.qaVerifyPwd = ''; this.openQaModal = true; },
                closeQaModal() { this.openQaModal = false; },
                
                async openAdminQaAnswer(qa) {
                    const { value: answer } = await Swal.fire({
                        title: 'Q&A 답변 등록',
                        input: 'textarea',
                        inputLabel: '작성자: ' + qa.name,
                        inputValue: qa.answer || '',
                        inputPlaceholder: '답변을 입력하세요...',
                        showCancelButton: true,
                        confirmButtonText: '저장',
                        cancelButtonText: '취소',
                        confirmButtonColor: '#10b981'
                    });
                    if (answer !== undefined) {
                        let idx = (this.data.qaList || []).findIndex(q => q.id === qa.id);
                        if (idx > -1) {
                            this.data.qaList[idx].answer = answer;
                            this.saveData('qa');
                            Swal.fire('완료', '답변이 성공적으로 등록되었습니다.', 'success');
                        }
                    }
                },

                uploadQaFile(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    if(file.size > 1024 * 1024) { Swal.fire('용량 초과', '게시판 첨부파일은 1MB 이하만 가능합니다.', 'warning'); return; }
                    this.newQa.fileName = file.name;
                    const r = new FileReader(); 
                    r.onload = (ev) => { this.newQa.fileData = ev.target.result; }; 
                    r.readAsDataURL(file);
                },
                downloadQAFile() {
                    if(!this.newQa.fileData) return;
                    let a = document.createElement('a'); 
                    a.href = this.newQa.fileData; 
                    a.download = this.newQa.fileName || '다운로드파일'; 
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                },
                saveQa() {
                    if(!this.newQa.title || !this.newQa.name || !this.newQa.pwd || !this.newQa.content) { Swal.fire('입력 누락', '제목, 작성자, 비밀번호, 내용을 모두 입력하세요.', 'warning'); return; }
                    if(this.newQa.pwd.length < 4) { Swal.fire('알림', '비밀번호는 숫자 4자리로 입력해주세요.', 'warning'); return; }
                    if(!this.data.qaList) this.data.qaList = [];
                    let now = new Date();
                    
                    if(this.qaModalMode === 'new') {
                        let nextNo = this.data.qaList.length > 0 ? Math.max(...this.data.qaList.map(q=>parseInt(q.no)||0)) + 1 : 1;
                        this.newQa.no = nextNo;
                        this.newQa.id = 'qa_' + Date.now();
                        this.newQa.date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                        this.data.qaList.unshift(JSON.parse(JSON.stringify(this.newQa)));
                    } else if(this.qaModalMode === 'edit') {
                        let idx = this.data.qaList.findIndex(q=>q.id === this.newQa.id);
                        if(idx > -1) { this.data.qaList[idx] = JSON.parse(JSON.stringify(this.newQa)); }
                    }
                    this.saveData('qa');
                    this.closeQaModal();
                    Swal.fire('완료', '게시물이 성공적으로 처리되었습니다.', 'success');
                },
                verifyQaEdit() {
                    if(this.qaVerifyPwd !== this.newQa.pwd && this.qaVerifyPwd !== this.data.pwd) { Swal.fire('권한 없음', '작성 시 설정한 비밀번호가 일치하지 않습니다.', 'error'); return; }
                    this.qaModalMode = 'edit';
                },
                verifyQaDelete() {
                    if(this.qaVerifyPwd !== this.newQa.pwd && this.qaVerifyPwd !== this.data.pwd) { Swal.fire('권한 없음', '작성 시 설정한 비밀번호가 일치하지 않습니다.', 'error'); return; }
                    this.deleteQA(this.newQa.id, false);
                },
                deleteQA(id, isAdmin = false) {
                    Swal.fire({ title: '게시물 영구 삭제', text: '정말로 이 게시물을 삭제하시겠습니까?', icon: 'warning', showCancelButton: true, confirmButtonText: '삭제 실행', confirmButtonColor: '#ef4444' })
                    .then(r => { 
                        if(r.isConfirmed) { 
                            if(!this.data.qaList) this.data.qaList = [];
                            this.data.qaList = this.data.qaList.filter(q => q.id !== id); 
                            this.saveData('qa'); 
                            this.closeQaModal(); 
                            Swal.fire('삭제 완료', '게시물이 안전하게 삭제되었습니다.', 'success'); 
                        } 
                    });
                },
                
                async renderStatChart() {
                    Swal.fire('안내', '현재 실시간 폴링 최적화 모드로 작동 중입니다. 차트 기능은 서버 부하 방지를 위해 일시 제한됩니다.', 'info');
                },

                downloadExcel(type) {
                    if (type === 'schedule' && window.XLSX) {
                        let rows = [['직군', '이름', '잔여연차']];
                        let days = this.calendarDays.filter(d => d.dateStr !== null).map(d => `${d.day}일`);
                        rows[0].push(...days);
                        
                        (this.data.employees || []).forEach(emp => {
                            let row = [emp.group, emp.name, this.getRemainLeaves(emp)];
                            this.calendarDays.filter(d => d.dateStr !== null).forEach(d => {
                                row.push(this.isHoliday(d.dateStr) ? '휴무' : this.getCellStyle(emp.id, d.dateStr).text);
                            });
                            rows.push(row);
                        });
                        let ws = XLSX.utils.aoa_to_sheet(rows);
                        let wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "통합스케줄");
                        XLSX.writeFile(wb, `통합스케줄_${this.currentYear}년_${this.currentMonth}월.xlsx`);
                    } else if (type === 'emp' && window.XLSX) {
                        let rows = [['No', '직군', '이름', '입사일', '총 발생', '총 사용', '잔여연차']];
                        (this.data.employees || []).forEach((emp, i) => {
                            rows.push([
                                i + 1, emp.group, emp.name, emp.joinDate,
                                this.calculateTotalLeaves(emp.joinDate),
                                this.calculateUsed(emp),
                                this.getRemainLeaves(emp)
                            ]);
                        });
                        let ws = XLSX.utils.aoa_to_sheet(rows);
                        let wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "직원명단");
                        XLSX.writeFile(wb, `직원연차명단_${this.currentYear}년.xlsx`);
                    }
                }
            }
        }
    </script>
</body>
