<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>노원다인치과병원 포털</title>
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-hide { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; overflow: visible !important; zoom: 0.9; }
            .table-wrapper { overflow: visible !important; max-height: none !important; height: auto !important; }
            table { width: 100% !important; table-layout: fixed !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            td, th { overflow: visible !important; white-space: nowrap !important; }
        }
        
        /* 모바일 스케줄 스크롤 고정 최적화 (좌측 4칸 완벽 고정) */
        .admin-compact td, .admin-compact th { padding: 3px 5px; font-size: 11.5px; }
        .table-wrapper { overflow-x: auto; overflow-y: auto; position: relative; max-width: 100%; max-height: 55vh; }
        .sticky-col { position: sticky !important; z-index: 10; background-color: #ffffff; }
        thead .sticky-col { z-index: 30 !important; background-color: #f8fafc; }
        
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .flex-center { display: flex; align-items: center; justify-content: center; }

        /* 상태 펄스 애니메이션 */
        @keyframes pulse-status {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .status-pulse { animation: pulse-status 2s infinite; }
        @keyframes pulse-error {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .status-error { animation: pulse-error 2s infinite; }
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="antialiased h-screen flex flex-col overflow-hidden">

    <!-- [1. 관리자 모드] -->
    <main class="flex-grow flex flex-col h-full bg-[#f8fafc] relative z-50 print-hide" x-show="isAdminMode" x-cloak>
        <div class="bg-slate-900 text-white px-4 py-3 flex items-center justify-between shrink-0 shadow-md z-30 h-14">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 rounded-full bg-blue-600 flex-center shadow-inner"><i class="fa-solid fa-wrench text-[13px]"></i></div>
                <h2 class="font-black text-[15px] sm:text-[16px] tracking-tight hidden sm:block">포털 통합 관리시스템</h2>
                <h2 class="font-black text-[15px] tracking-tight sm:hidden">관리시스템</h2>
            </div>
            <div class="flex gap-2">
                <button @click="saveData()" class="px-3 sm:px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-[12.5px] font-bold shadow-sm transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden sm:inline">전체 저장</span><span class="sm:hidden">저장</span>
                </button>
                <button @click="adminLogout" class="px-3 sm:px-4 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-[12.5px] font-bold shadow-sm transition-colors">나가기</button>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row flex-1 overflow-hidden h-[calc(100vh-3.5rem)]">
            <!-- 모바일: 메뉴 잘림 완벽 해결 (한 화면 핏 랩핑) -->
            <div class="w-full sm:w-48 bg-white border-b sm:border-r border-gray-200 shadow-[2px_0_8px_rgba(0,0,0,0.02)] flex flex-row sm:flex-col flex-wrap sm:flex-nowrap p-1.5 sm:p-0 sm:py-3 shrink-0 z-20 overflow-y-auto hide-scrollbar gap-1 sm:gap-0 justify-center sm:justify-start">
                <template x-for="tab in adminTabs" :key="tab.id">
                    <button @click="adminTab = tab.id" 
                            class="flex-auto sm:flex-none text-center sm:text-left px-2 sm:px-4 py-2 sm:py-3.5 text-[11px] sm:text-[13px] font-bold transition-all relative flex flex-row items-center justify-center sm:justify-start gap-1 sm:gap-3 rounded-lg sm:rounded-none m-0 sm:m-0"
                            :class="adminTab === tab.id ? 'text-blue-700 bg-blue-50/80 sm:bg-blue-50/50 border border-blue-100 sm:border-none' : 'text-gray-500 hover:bg-gray-50 border border-transparent sm:border-none'"
                            :title="tab.name">
                        <i :class="tab.icon" class="w-4 text-center text-[12px] sm:text-[14px]" :class="adminTab === tab.id ? 'text-blue-600' : 'text-gray-400'"></i>
                        <span x-text="tab.name"></span>
                        <div x-show="adminTab === tab.id" class="hidden sm:block absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r-md shadow-[1px_0_4px_rgba(37,99,235,0.4)]"></div>
                    </button>
                </template>
            </div>

            <div class="flex-1 overflow-y-auto p-2 sm:p-4 relative hide-scrollbar">
                
                <!-- 1-1. 스케줄 에디터 -->
                <template x-if="adminTab === 'schedule_edit'">
                    <div class="space-y-3 max-w-[1400px] w-full mx-auto flex flex-col h-full pb-4 px-1">
                        <div class="bg-blue-50/50 border border-blue-200 rounded-xl p-3 flex items-start gap-2.5 shadow-sm shrink-0">
                            <i class="fa-solid fa-circle-info text-blue-500 mt-0.5 text-[14px]"></i>
                            <div class="w-full">
                                <h4 class="font-bold text-blue-800 text-[13.5px] mb-1">통합 스케줄 편집기</h4>
                                <p class="text-[12px] text-blue-600 leading-snug mb-2 break-keep">모든 직군의 스케줄을 한눈에 확인하고 클릭만으로 빠르게 수정할 수 있습니다.<br>※ 달력 관리에서 지정한 <strong class="text-red-500">휴무일은 자동으로 빨간색 '휴무'로 표기</strong>됩니다.</p>
                                <div class="flex flex-wrap gap-1.5 pt-2 border-t border-blue-200/50 items-center">
                                    <span class="text-[11.5px] font-bold text-blue-800 mr-1"><i class="fa-solid fa-tags text-blue-500 mr-1"></i> 현재 등록된 범례:</span>
                                    <template x-for="type in (data.shiftTypes || []).filter(t => t.code !== '' && t.code !== '정상')" :key="'leg_show_'+type.code">
                                        <span class="text-[10.5px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-black/5" :class="type.color + ' ' + type.bgText" x-text="type.code + (type.label ? `(${type.label})` : '')"></span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 min-h-[400px] overflow-hidden admin-compact relative">
                            <div class="p-2.5 border-b border-gray-100 flex items-center justify-between bg-gray-50 shrink-0 z-20 flex-wrap gap-2">
                                <div class="flex items-center gap-2">
                                    <div class="flex gap-1 bg-white border border-gray-200 rounded-lg shadow-sm">
                                        <button @click="changeMonth(-1)" class="w-7 h-7 hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-left text-[11px]"></i></button>
                                        <div class="w-20 flex-center font-black text-[13px] text-gray-800 border-x border-gray-100" x-text="`${currentYear}년 ${currentMonth}월`"></div>
                                        <button @click="changeMonth(1)" class="w-7 h-7 hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-right text-[11px]"></i></button>
                                    </div>
                                    <select x-model="selectedGroup" class="bg-white border border-gray-300 text-gray-700 text-[12px] rounded-lg focus:ring-blue-500 px-3 py-1.5 font-bold shadow-sm outline-none cursor-pointer">
                                        <option value="전체">전체 직군 보기</option>
                                        <template x-for="g in (data.groups || [])" :key="g"><option :value="g" x-text="g"></option></template>
                                    </select>
                                </div>
                                <button @click="downloadExcel('schedule')" class="px-3 py-1.5 text-[11.5px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg hover:bg-emerald-100 flex items-center gap-1.5 shadow-sm transition-colors hidden sm:flex"><i class="fa-solid fa-file-excel"></i> 엑셀 백업</button>
                            </div>

                            <div class="table-wrapper flex-1 p-0 hide-scrollbar rounded-b-xl relative bg-white border-b border-gray-400">
                                <table class="w-full text-center border-collapse table-fixed min-w-max border-r border-gray-400">
                                    <thead class="bg-gray-100 sticky top-0 z-30 shadow-[0_1px_2px_rgba(0,0,0,0.1)]">
                                        <tr>
                                            <!-- 좌측 4칸 픽셀 고정 (관리자/유저 동일 적용) -->
                                            <th class="w-[30px] min-w-[30px] border-b border-r border-gray-400 text-gray-700 font-bold sticky left-0 sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] text-[10px] md:text-[11px] py-2 z-40">No.</th>
                                            <th class="w-[65px] min-w-[65px] border-b border-r border-gray-400 text-gray-700 font-bold sticky left-[30px] sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] whitespace-nowrap text-[11px] md:text-[12px] py-2 z-40">직군</th>
                                            <th class="w-[55px] min-w-[55px] border-b border-r border-gray-400 text-gray-700 font-bold sticky left-[95px] sticky-col bg-gray-100 shadow-[1px_0_0_#94a3b8] whitespace-nowrap text-[11px] md:text-[12px] py-2 z-40">이름</th>
                                            <th class="w-[45px] min-w-[45px] border-b border-r-2 border-gray-500 text-blue-700 font-bold sticky left-[150px] sticky-col bg-blue-50 shadow-[2px_0_0_#64748b] text-[10.5px] md:text-[11px] py-2 leading-tight z-40">잔여<br>연차</th>
                                            
                                            <!-- 스크롤 되는 날짜 영역 -->
                                            <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_th_'+dateObj.id">
                                                <th class="w-[24px] md:w-[26px] lg:w-[28px] xl:w-[31px] min-w-[24px] md:min-w-[26px] lg:min-w-[28px] xl:min-w-[31px] border-b border-r border-gray-400 py-1" :class="isHoliday(dateObj.dateStr) ? 'bg-red-50/50' : ''">
                                                    <div class="text-[9px] md:text-[11px] font-black leading-none" :class="dateObj.isSun ? 'text-red-600' : (dateObj.isSat ? 'text-blue-600' : 'text-gray-800')" x-text="dateObj.day"></div>
                                                    <div class="text-[8px] md:text-[9px] text-gray-600 font-medium mt-0.5" x-text="dateObj.dayName"></div>
                                                </th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(emp, index) in filteredEmployees" :key="'adm_emp_'+emp.id">
                                            <tr class="hover:bg-blue-50/30 transition-colors border-b border-gray-300">
                                                <!-- 좌측 4칸 픽셀 고정 데이터 -->
                                                <td class="border-r border-gray-400 text-[10px] md:text-[11px] font-bold text-gray-500 sticky left-0 sticky-col bg-white shadow-[1px_0_0_#94a3b8] text-center py-2 z-20" x-text="index + 1"></td>
                                                <td class="border-r border-gray-400 text-[11px] md:text-[11.5px] font-medium text-gray-700 sticky left-[30px] sticky-col bg-white shadow-[1px_0_0_#94a3b8] whitespace-nowrap py-2 z-20" x-text="emp.group"></td>
                                                <td class="font-black text-[11.5px] md:text-[12px] text-gray-800 border-r border-gray-400 sticky left-[95px] sticky-col bg-white shadow-[1px_0_0_#94a3b8] whitespace-nowrap py-2 z-20" x-text="emp.name"></td>
                                                <td class="font-black text-[11px] md:text-[12px] text-blue-700 border-r-2 border-gray-500 sticky left-[150px] sticky-col bg-blue-50/40 shadow-[2px_0_0_#64748b] text-center py-2 z-20" x-text="getRemainLeaves(emp)"></td>
                                                
                                                <!-- 스크롤 되는 스케줄 셀 영역 -->
                                                <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_td_'+emp.id+'_'+dateObj.id">
                                                    <td class="cursor-pointer hover:opacity-80 transition-opacity p-0 select-none relative h-[30px] md:h-[36px] w-[24px] md:w-[26px] lg:w-[28px] xl:w-[31px] max-w-[31px] border-r border-gray-300 overflow-hidden z-0"
                                                        :class="isHoliday(dateObj.dateStr) ? 'bg-red-50/20' : (getCellStyle(emp.id, dateObj.dateStr).bgClass)"
                                                        @click="!isHoliday(dateObj.dateStr) && toggleScheduleCell(emp.id, dateObj.dateStr)">
                                                        <div class="w-full h-full flex-center overflow-hidden px-0 tracking-tighter">
                                                            <span class="text-[8.5px] md:text-[10px] lg:text-[11px] font-bold block w-full text-center truncate-text" 
                                                                  :class="isHoliday(dateObj.dateStr) ? 'text-red-600' : getCellStyle(emp.id, dateObj.dateStr).textClass"
                                                                  x-text="isHoliday(dateObj.dateStr) ? '휴무' : getCellStyle(emp.id, dateObj.dateStr).text"></span>
                                                        </div>
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                        <template x-if="filteredEmployees.length === 0">
                                            <tr><td :colspan="calendarDays.filter(d => d.dateStr !== null).length + 4" class="py-8 text-gray-400 text-[12px] font-medium border-b border-gray-200">등록된 직원이 없습니다.</td></tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 1-2. 범례 및 달력 휴무 관리 -->
                <template x-if="adminTab === 'legend'">
                    <div class="space-y-4 max-w-5xl mx-auto pb-6">
                        <div class="bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-gray-200">
                            <h3 class="font-black text-gray-800 text-[14px] mb-4 flex items-center gap-2"><i class="fa-solid fa-palette text-blue-500"></i> 스케줄 범례 커스텀 (한글 코드 가능)</h3>
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
                                <template x-for="(type, idx) in (data.shiftTypes || [])" :key="'leg_'+idx">
                                    <div class="flex flex-wrap sm:flex-nowrap items-center gap-2 p-2.5 bg-gray-50 rounded-xl border border-gray-200 shadow-sm relative overflow-hidden group hover:border-blue-300 transition-colors w-full">
                                        <input type="text" x-model="type.code" placeholder="코드" class="w-14 px-2 py-1.5 text-[12px] border rounded-lg text-center font-bold focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 shrink-0 outline-none">
                                        <input type="text" x-model="type.label" placeholder="상세설명" class="flex-1 min-w-[80px] px-2.5 py-1.5 text-[12px] border rounded-lg font-medium focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 outline-none">
                                        <select x-model="type.color" class="w-24 px-2 py-1.5 text-[12px] border rounded-lg focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 font-bold shrink-0 outline-none cursor-pointer">
                                            <option value="bg-transparent">투명(흰색)</option>
                                            <option value="bg-blue-500">파랑</option><option value="bg-emerald-500">초록</option>
                                            <option value="bg-indigo-500">남색</option><option value="bg-purple-500">보라</option>
                                            <option value="bg-amber-400">노랑</option><option value="bg-rose-500">빨강</option>
                                            <option value="bg-slate-700">검정</option><option value="bg-cyan-500">하늘</option>
                                            <option value="bg-pink-500">핑크</option>
                                        </select>
                                        <select x-model="type.bgText" class="w-20 px-2 py-1.5 text-[12px] border rounded-lg focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 font-bold shrink-0 outline-none cursor-pointer">
                                            <option value="text-white">흰글씨</option>
                                            <option value="text-gray-800">검은글씨</option>
                                        </select>
                                        <div class="flex items-center bg-white border border-gray-200 rounded-lg px-2 py-1.5 w-[75px] shadow-sm z-10 shrink-0">
                                            <span class="text-[10.5px] text-gray-500 font-bold mr-1.5 whitespace-nowrap">연차<br>차감</span>
                                            <input type="number" step="0.5" min="0" x-model="type.deduction" class="w-full text-[12px] text-center font-black text-red-500 outline-none bg-transparent">
                                        </div>
                                        <button @click="data.shiftTypes.splice(idx, 1); saveData('legend');" class="w-8 h-8 flex-center text-red-400 hover:text-white hover:bg-red-500 bg-white border border-gray-200 rounded-lg shadow-sm transition-colors shrink-0 z-10"><i class="fa-solid fa-trash-can text-[12px]"></i></button>
                                        <div class="absolute left-0 top-0 bottom-0 w-1.5 z-0" :class="type.color"></div>
                                    </div>
                                </template>
                                <button @click="data.shiftTypes.push({code:'', label:'', color:'bg-transparent', bgText:'text-gray-800', deduction: 0}); saveData('legend');" class="border-2 border-dashed border-gray-300 rounded-xl text-gray-500 text-[12px] font-bold hover:bg-gray-50 transition-colors p-3 flex-center gap-2 min-h-[52px]"><i class="fa-solid fa-plus"></i> 범례 추가</button>
                            </div>
                        </div>

                        <div class="bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-gray-200">
                            <h3 class="font-black text-gray-800 text-[14px] mb-4 flex items-center gap-2"><i class="fa-regular fa-calendar-xmark text-red-500"></i> 메인 달력 휴무일 관리 (클릭 시 토글)</h3>
                            <div class="mb-4 flex items-center gap-3 bg-gray-50 p-3 rounded-xl border border-gray-200 flex-wrap shadow-sm">
                                <span class="text-[12px] font-bold text-gray-700 whitespace-nowrap">기본 휴무 세팅:</span>
                                <div class="flex gap-2.5 flex-wrap">
                                    <template x-for="(dayName, idx) in ['일','월','화','수','목','금','토']" :key="'def_hol_'+idx">
                                        <label class="flex items-center gap-1.5 cursor-pointer bg-white px-2.5 py-1.5 rounded-lg shadow-sm border border-gray-200 hover:border-blue-300 transition-colors">
                                            <input type="checkbox" :value="idx.toString()" x-model="data.defaultHolidays" @change="saveData('legend')" class="w-3.5 h-3.5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                                            <span class="text-[11.5px] font-bold" :class="idx===0 ? 'text-red-500' : (idx===6 ? 'text-blue-500' : 'text-gray-700')" x-text="dayName + '요일'"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>

                            <div class="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm max-w-3xl">
                                <div class="bg-gray-50 p-2.5 border-b border-gray-200 flex items-center justify-between">
                                    <div class="font-black text-blue-800 text-[13px] pl-2" x-text="`${currentYear}년 ${currentMonth}월 상세 세팅`"></div>
                                    <div class="flex gap-1 bg-white border border-gray-200 rounded-lg shadow-sm">
                                        <button @click="changeMonth(-1)" class="w-7 h-7 rounded-l hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-left text-[11px]"></i></button>
                                        <button @click="changeMonth(1)" class="w-7 h-7 rounded-r border-l border-gray-200 hover:bg-gray-50 flex-center text-gray-500"><i class="fa-solid fa-chevron-right text-[11px]"></i></button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-7 text-center">
                                    <template x-for="(day, idx) in ['일','월','화','수','목','금','토']" :key="'cal_hh_'+idx">
                                        <div class="py-2 font-bold text-[12px] border-b border-r border-gray-100 bg-gray-50" :class="idx===0 ? 'text-red-500' : (idx===6 ? 'text-blue-500' : 'text-gray-700')" x-text="day"></div>
                                    </template>
                                    <template x-for="dateObj in calendarDays" :key="'cal_dd_'+dateObj.id">
                                        <div class="h-[50px] p-1 border-b border-r border-gray-100 flex flex-col items-center justify-center cursor-pointer transition-colors"
                                             :class="!dateObj.dateStr ? 'bg-gray-50/20' : (isHoliday(dateObj.dateStr) ? 'bg-red-50/20 hover:bg-red-50' : 'bg-white hover:bg-gray-50')"
                                             @click="dateObj.dateStr && toggleHoliday(dateObj.dateStr)">
                                            <template x-if="dateObj.dateStr">
                                                <div class="w-full flex flex-col items-center">

                async init() {
                    this.loadLocalData();

                    // 모바일 화면 꺼짐 방어 3중 복구 엔진 (Force Sync)
                    document.addEventListener("visibilitychange", () => {
                        if (document.visibilityState === "visible") {
                            if (!isDbConnected || this.systemStatus === 'error') {
                                this.connectFirebase();
                            } else {
                                this.forceResyncFromFirebase();
                            }
                        }
                    });
                    
                    window.addEventListener("focus", () => {
                        if (!isDbConnected || this.systemStatus === 'error') this.connectFirebase();
                        else this.forceResyncFromFirebase();
                    });
                    
                    window.addEventListener("online", () => {
                        this.connectFirebase();

                    });

                    setInterval(() => {
                        if (!isDbConnected || this.systemStatus === 'error') this.connectFirebase();

                    }, 10000);

                async connectFirebase() {
                    if (isDbConnected) return;
                    try {
                        if (!fbConfig) throw new Error("No Config");
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously, signInWithCustomToken } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, doc, getDoc: fbGetDoc, setDoc: fbSetDoc, onSnapshot: fbOnSnapshot, increment: fbIncrement } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        
                        const app = initializeApp(fbConfig);
                        auth = getAuth(app);
                        db = getFirestore(app);
                        docFunc = doc; setDoc = fbSetDoc; getDoc = fbGetDoc; onSnapshot = fbOnSnapshot; increment = fbIncrement;

                        let token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (token) await signInWithCustomToken(auth, token);
                        else await signInAnonymously(auth);

                        isDbConnected = true;
                        this.systemStatus = 'normal';

                        const docRef = docFunc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v4');
                        onSnapshot(docRef, (snapshot) => {
                            try {
                                if (snapshot.exists()) {
                                    this.mergeData(snapshot.data());
                                    this.generateCalendar();
                                }
                            } catch(e) { }
                        }, (error) => { this.systemStatus = 'error'; isDbConnected = false; });

                        this.trackVisitRealtime();

                    } catch(e) { 
                        this.systemStatus = 'error'; 
                        isDbConnected = false;
                        this.trackVisitLocal(); 
                    }
                },

                async forceResyncFromFirebase() {
                    if(isDbConnected && auth && auth.currentUser) {
                        try {
                            const docRef = docFunc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v4');
                            const snap = await getDoc(docRef);
                            if(snap.exists()) {
                                this.mergeData(snap.data());
                                this.generateCalendar();
                            }
                        } catch(e) {}
                    }
                },

                fetchDailyQuote() {
                    const now = new Date();
                    const start = new Date(now.getFullYear(), 0, 0);
                    const dayOfYear = Math.floor((now - start) / (1000 * 60 * 60 * 24));
                    const isPM = now.getHours() >= 12 ? 1 : 0;
                    const cycleIndex = (dayOfYear * 2) + isPM; // 하루 2번(0~12, 12~24) 인덱스 변경되도록 설계
                    
                    try {
                        this.currentQuote = this.koreanQuotesDB[cycleIndex % this.koreanQuotesDB.length];
                    } catch(e) {
                        this.currentQuote = { text: "환자의 밝은 미소가 우리의 가장 큰 보람입니다.", author: "다인치과병원" };
                    }
                },

                // 강력한 깊은 복사(Deep Copy) 병합 로직 - 모바일 튕김 방어
                mergeData(source) {
                    if(!source) return;
                    const merged = JSON.parse(JSON.stringify(source));
                    
                    if(!merged.pwd) merged.pwd = '1234';
                    if(!merged.leaveStandard) merged.leaveStandard = 'join';
                    if(!merged.employees) merged.employees = [];
                    if(!merged.shiftTypes) merged.shiftTypes = [];
                    if(!merged.qaList) merged.qaList = [];
                    if(!merged.files) merged.files = [];
                    if(!merged.welfares) merged.welfares = [];
                    if(!merged.groups) merged.groups = [];
                    if(!merged.schedules) merged.schedules = {};
                    if(merged.isQuotesEnabled === undefined) merged.isQuotesEnabled = true;
                    if(!merged.content) merged.content = {};
                    if(!merged.content.shortcuts) merged.content.shortcuts = [];
                    if(!merged.content.customLogo) merged.content.customLogo = '';
                    
                    if(!merged.info) merged.info = {};
                    if(!merged.info.time1Title) {
                        merged.info.time1Title = "월금(야간)"; merged.info.time1Desc = "09:30 ~ 21:00";
                        merged.info.time2Title = "화 / 수"; merged.info.time2Desc = "09:30 ~ 19:00 / 18:30";
                        merged.info.time3Title = "토 요 일"; merged.info.time3Desc = "09:30 ~ 14:00 (점심없음)";
                        merged.info.time4Title = "목 / 일"; merged.info.time4Desc = "정기 휴진";
                    }

                    this.data = merged;
                },

                loadLocalData() {
                    try {
                        let saved = localStorage.getItem('ndain_portal_master_v4');
                        if (saved) this.mergeData(JSON.parse(saved));

                async saveData(context = null) {
                    if(context) this.updateAlertMessage(context);
                    let pureData = JSON.parse(JSON.stringify(this.data));
                    localStorage.setItem('ndain_portal_master_v4', JSON.stringify(pureData));
                    if(isDbConnected && auth && auth.currentUser) {
                        try {
                            const docRef = docFunc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v4');
                            await setDoc(docRef, pureData);
                            this.systemStatus = 'normal';
                        } catch(e) { this.systemStatus = 'error'; isDbConnected = false; }
                    }
                    if(!context) Swal.fire({ title: '저장 완료', text: '모바일과 PC 화면에 실시간 연동되었습니다.', icon: 'success', timer: 1200, showConfirmButton: false });
                },

                updateAlertMessage(context) {
                    let now = new Date();
                    this.data.content.latestUpdateDate = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    const map = { 'schedule_edit': '통합 스케줄 편집', 'legend': '메인 달력 설정', 'emp': '직원 및 연차 관리', 'content': '게이트웨이 설정', 'info': '병원 소개', 'welfare': '복리후생', 'files': '사내자료 및 OJT', 'qa': 'Q&A', 'pwd': '시스템 보안' };
                    let targetName = map[context] || '시스템 통합';
                    this.data.content.latestUpdateText = `[업데이트] 관리자가 '${targetName}' 내역을 최신으로 업데이트했습니다.`;
                },

                async trackVisitRealtime() {
                    let today = new Date().toISOString().slice(0, 10);
                    let hasVisitedToday = sessionStorage.getItem('visited_' + today);
                    try {
                        const statRef = docFunc(db, 'artifacts', appId, 'public', 'data', 'stats', today);
                        const globalStatRef = docFunc(db, 'artifacts', appId, 'public', 'data', 'stats', 'total');
                        onSnapshot(statRef, (snap) => { try { if (snap.exists()) this.todayVisits = snap.data().count || 0; } catch(e){} }, (err) => {});
                        onSnapshot(globalStatRef, (snap) => { try { if (snap.exists()) this.totalVisits = snap.data().count || 0; } catch(e){} }, (err) => {});
                        if (!hasVisitedToday && auth && auth.currentUser) {
                            sessionStorage.setItem('visited_' + today, 'true');
                            try {
                                await setDoc(statRef, { count: increment(1) }, { merge: true });
                                await setDoc(globalStatRef, { count: increment(1) }, { merge: true });
                            } catch(writeErr) { }
                        }
                    } catch(e) { this.trackVisitLocal(); }
                },
                trackVisitLocal() {
                    let today = new Date().toISOString().slice(0, 10);
                    let hasVisitedToday = sessionStorage.getItem('visited_' + today);
                    let stats = JSON.parse(localStorage.getItem('ndain_stats_v4') || '{"total":0}');
                    if(!stats[today]) stats[today] = { today: 0 };
                    if (!hasVisitedToday) {
                        stats[today].today += 1;
                        stats.total = (stats.total || 0) + 1;
                        localStorage.setItem('ndain_stats_v4', JSON.stringify(stats));
                        sessionStorage.setItem('visited_' + today, 'true');
                    }
                    this.todayVisits = stats[today].today;
                    this.totalVisits = stats.total;
                },

                adminLogin() {
                    if (this.adminPwdInput === (this.data.pwd || '1234')) {
                        this.isAdminMode = true; this.showAdminLogin = false; this.adminPwdInput = '';
                        this.adminTab = 'schedule_edit';
                    } else { Swal.fire('실패', '비밀번호가 일치하지 않습니다.', 'error'); this.adminPwdInput = ''; }
                },
                adminLogout() { this.isAdminMode = false; this.activeMenu = 'main'; },
                updatePassword() {
                    if (this.pwdChange.current !== (this.data.pwd || '1234')) {
                        Swal.fire('오류', '현재 비밀번호가 틀렸습니다.', 'error'); return;
                    }
                    if (this.pwdChange.new.length < 4) {
                        Swal.fire('오류', '새 비밀번호는 4자리를 입력하세요.', 'warning'); return;
                    }
                    this.data.pwd = this.pwdChange.new;
                    this.saveData('pwd');
                    this.pwdChange = { current: '', new: '' };
                },

                generateCalendar() {
                    let firstDay = new Date(this.currentYear, this.currentMonth - 1, 1).getDay();
                    let lastDate = new Date(this.currentYear, this.currentMonth, 0).getDate();
                    let days = [];
                    for (let i = 0; i < firstDay; i++) days.push({ id: `e_${i}`, dateStr: null, day: '', dayName: '' });
                    const dayNames = ['일','월','화','수','목','금','토'];
                    for (let i = 1; i <= lastDate; i++) {
                        let dateObj = new Date(this.currentYear, this.currentMonth - 1, i);
                        let dateStr = `${this.currentYear}-${String(this.currentMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                        days.push({ id: `d_${i}`, dateStr: dateStr, day: i, dayName: dayNames[dateObj.getDay()], isSun: dateObj.getDay() === 0, isSat: dateObj.getDay() === 6 });
                    }
                    this.calendarDays = days;
                },
                changeMonth(delta) {
                    this.currentMonth += delta;
                    if (this.currentMonth > 12) { this.currentMonth = 1; this.currentYear++; } 
                    else if (this.currentMonth < 1) { this.currentMonth = 12; this.currentYear--; }
                    this.generateCalendar();
                },

                isHoliday(dateStr) {
                    if (!dateStr) return false;
                    if ((this.data.customHolidays || []).includes(dateStr)) return true;
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) return true;
                    return false;
                },
                toggleHoliday(dateStr) {
                    if(!this.data.customHolidays) this.data.customHolidays = [];
                    let idx = this.data.customHolidays.indexOf(dateStr);
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) { Swal.fire('안내', '해당 요일은 위 기본 세팅에서 체크 해제하세요.', 'info'); return; }
                    
                    if (idx > -1) this.data.customHolidays.splice(idx, 1);
                    else this.data.customHolidays.push(dateStr);
                    this.saveData('legend');
                },

                get filteredEmployees() { return this.selectedGroup === '전체' ? (this.data.employees || []) : (this.data.employees || []).filter(e => e.group === this.selectedGroup); },
                
                addGroup() { 
                    if(this.newGroup && !(this.data.groups||[]).includes(this.newGroup)) { 
                        this.data.groups.push(this.newGroup); 
                        this.newGroup = ''; 
                        this.saveData('emp'); 
                    } 
                },

                renameGroup(oldName, newName, idx) {
                    if(!newName || newName.trim() === '') { this.data.groups = [...this.data.groups]; return; }
                    if(this.data.groups.includes(newName) && oldName !== newName) { Swal.fire('알림', '이미 존재하는 직군입니다.', 'warning'); this.data.groups = [...this.data.groups]; return; }
                    this.data.groups[idx] = newName;
                    if(this.data.employees) {
                        this.data.employees.forEach(emp => { if(emp.group === oldName) emp.group = newName; });
                    }
                    this.saveData('emp');
                },

                addEmployee() {
                    if(!this.newEmp.group || !this.newEmp.name) { Swal.fire('알림', '직군과 이름을 입력하세요', 'warning'); return; }
                    if(!this.data.employees) this.data.employees = [];
                    this.data.employees.push({ id: 'e_' + Date.now(), ...this.newEmp });
                    this.newEmp = { group: '', name: '', joinDate: '', usedLeaves: 0 };
                    this.saveData('emp');
                },
                removeEmployee(id) { this.data.employees = (this.data.employees||[]).filter(e => e.id !== id); this.saveData('emp'); },

                calculateTotalLeaves(joinDateStr) {
                    if(!joinDateStr) return 0;
                    let jd = new Date(joinDateStr); let now = new Date();
                    if (now < jd) return 0; 
                    let yearsDiff = now.getFullYear() - jd.getFullYear();
                    if (this.data.leaveStandard === 'fiscal') {
                        if (yearsDiff === 0) {
                            let months = now.getMonth() - jd.getMonth();
                            if (now.getDate() < jd.getDate()) months--;
                            return Math.max(0, months).toFixed(1);
                        } else {
                            let daysInJoinYear = (new Date(jd.getFullYear(), 11, 31) - jd) / (1000 * 60 * 60 * 24) + 1;
                            let firstYearProrated = 15 * (daysInJoinYear / 365);
                            if (yearsDiff === 1) return firstYearProrated.toFixed(1);
                            let base = 15; let extra = Math.floor((yearsDiff - 2) / 2);
                            return Math.min(base + extra, 25).toFixed(1);
                        }
                    } else {
                        let months = yearsDiff * 12 + (now.getMonth() - jd.getMonth());
                        if (now.getDate() < jd.getDate()) months--;
                        if (months < 12) return Math.max(0, months).toFixed(1);
                        let years = Math.floor(months / 12);
                        let base = 15; let extra = Math.floor((years - 1) / 2);
                        return Math.min(base + extra, 25).toFixed(1);
                    }
                },
                calculateUsed(emp) {
                    let used = parseFloat(emp.usedLeaves || 0);
                    let currentYearStr = new Date().getFullYear().toString();
                    let todayStr = new Date().toISOString().slice(0, 10);
                    if(this.data.schedules && this.data.schedules[emp.id]) {
                        for(let date in this.data.schedules[emp.id]) {
                            if(date.startsWith(currentYearStr) && date <= todayStr) {
                                let code = this.data.schedules[emp.id][date];
                                let type = (this.data.shiftTypes||[]).find(t => t.code === code);
                                if(type && type.deduction > 0) used += parseFloat(type.deduction);
                            }
                        }
                    }
                    return used.toFixed(1);
                },
                getRemainLeaves(emp) {
                    let total = parseFloat(this.calculateTotalLeaves(emp.joinDate));
                    let used = parseFloat(this.calculateUsed(emp));
                    return (total - used).toFixed(1);
                },

                toggleScheduleCell(empId, dateStr) {
                    if(!this.data.schedules) this.data.schedules = {};
                    if(!this.data.schedules[empId]) this.data.schedules[empId] = {};
                    let currentCode = this.data.schedules[empId][dateStr] || '정상';
                    let codes = (this.data.shiftTypes || []).map(t => t.code);
                    let currentIndex = codes.indexOf(currentCode);
                    let nextIndex = (currentIndex + 1) % codes.length;
                    let nextCode = codes[nextIndex];
                    if(nextCode === '정상' || nextCode === '') {
                        delete this.data.schedules[empId][dateStr];
                    } else {
                        this.data.schedules[empId][dateStr] = nextCode;
                    }
                    this.data.schedules = JSON.parse(JSON.stringify(this.data.schedules));
                    this.saveData('schedule_edit'); 
                },
                getCellStyle(empId, dateStr) {
                    let code = (this.data.schedules && this.data.schedules[empId] && this.data.schedules[empId][dateStr]) ? this.data.schedules[empId][dateStr] : '정상';
                    let type = (this.data.shiftTypes || []).find(t => t.code === code);
                    if(type && type.code !== '정상') return { text: type.code, bgClass: type.color, textClass: type.bgText };
                    return { text: '', bgClass: 'bg-transparent', textClass: 'text-gray-800' };
                },

                getIconClass(name) {
                    let text = name || '';
                    if (text.includes('홈페이지')) return 'fa-house';
                    if (text.includes('블로그')) return 'fa-brands fa-blogger-b';
                    if (text.includes('페이스북') || text.toLowerCase().includes('facebook')) return 'fa-brands fa-facebook';
                    if (text.includes('인스타') || text.toLowerCase().includes('instagram')) return 'fa-brands fa-instagram';
                    if (text.includes('유튜브') || text.toLowerCase().includes('youtube')) return 'fa-brands fa-youtube';
                    return 'fa-link';
                },
                getShortcutStyle(btn, idx) {
                    if(btn && btn.colorId && this.shortcutColors) {
                        let found = this.shortcutColors.find(c => c.id === btn.colorId);
                        if(found) return found;
                    }
                    if(this.shortcutColors && this.shortcutColors.length > 0) {
                        return this.shortcutColors[idx % this.shortcutColors.length];
                    }
                    return { bg: 'bg-blue-500', iconColor: 'text-blue-500' };
                },
                addShortcut() {
                    if(!this.data.content.shortcuts) this.data.content.shortcuts = [];
                    // AI 자동 배정 로직 (겹치지 않게 순서대로 배정)
                    let usedColors = this.data.content.shortcuts.map(s => s.colorId);
                    let available = this.shortcutColors.filter(c => !usedColors.includes(c.id));
                    let nextColor = available.length > 0 ? available[0].id : this.shortcutColors[0].id;

                    this.data.content.shortcuts.push({name: '', url: '', colorId: nextColor});
                    this.saveData('content');
                },

                uploadLogoFile(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    if(file.size > 1024 * 1024) { Swal.fire('용량 초과', '1MB 이하의 이미지만 가능합니다.', 'warning'); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        if(!this.data.content) this.data.content = {};
                        this.data.content.customLogo = ev.target.result;
                        this.saveData('content');
                    };
                    reader.readAsDataURL(file);
                },

                downloadExcel(type) {
                    if (type === 'schedule' && window.XLSX) {
                        let rows = [['직군', '이름', '잔여연차']];
                        let days = this.calendarDays.filter(d => d.dateStr !== null).map(d => `${d.day}일`);
                        rows[0].push(...days);
                        
                        (this.data.employees || []).forEach(emp => {
                            let row = [emp.group, emp.name, this.getRemainLeaves(emp)];
                            this.calendarDays.filter(d => d.dateStr !== null).forEach(d => {
                                row.push(this.isHoliday(d.dateStr) ? '휴무' : this.getCellStyle(emp.id, d.dateStr).text);
                            });
                            rows.push(row);
                        });
                        let ws = XLSX.utils.aoa_to_sheet(rows);
                        let wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "통합스케줄");
                        XLSX.writeFile(wb, `통합스케줄_${this.currentYear}년_${this.currentMonth}월.xlsx`);
                    }
                }
            }
        }
    </script>
</body>
</html>
