<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>노원다인치과병원 포털</title>
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            body { background: white; }
            .print-hide { display: none !important; }
            .print-only { display: block !important; }
            .print-container { width: 100%; max-width: 100%; margin: 0; padding: 0; box-shadow: none; }
        }
        .admin-compact td, .admin-compact th { padding: 4px 6px; font-size: 11px; }
        .sticky-col { position: sticky; left: 0; z-index: 10; background-color: white; }
        .sticky-col:nth-child(1) { left: 0px; }
        .sticky-col:nth-child(2) { left: 55px; } 
        .sticky-col:nth-child(3) { left: 115px; border-right: 2px solid #cbd5e1; } 
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="antialiased h-screen flex flex-col overflow-hidden">

    <!-- [관리자 모드] -->
    <main class="flex-grow flex flex-col h-full bg-[#f8fafc] relative z-50 print-hide" x-show="isAdminMode" x-cloak>
        <!-- 관리자 헤더 -->
        <div class="bg-slate-900 text-white px-4 py-3 flex items-center justify-between shrink-0 shadow-md z-30 h-14">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center shadow-inner"><i class="fa-solid fa-wrench text-[12px]"></i></div>
                <h2 class="font-black text-[15px] tracking-tight">포털 통합 관리시스템</h2>
            </div>
            <div class="flex gap-2">
                <button @click="saveData()" class="px-4 py-1.5 bg-emerald-600 hover:bg-emerald-500 rounded-lg text-[12px] font-bold shadow-sm transition-colors flex items-center gap-1.5">
                    <i class="fa-solid fa-floppy-disk"></i> 전체 저장
                </button>
                <button @click="adminLogout" class="px-4 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-[12px] font-bold shadow-sm transition-colors">나가기</button>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden h-[calc(100vh-3.5rem)]">
            <!-- 좌측 탭 메뉴 -->
            <div class="w-44 bg-white border-r border-gray-200 shadow-[2px_0_8px_rgba(0,0,0,0.02)] flex flex-col py-3 shrink-0 z-20 overflow-y-auto hide-scrollbar">
                <template x-for="tab in adminTabs" :key="tab.id">
                    <button @click="adminTab = tab.id" 
                            class="text-left px-4 py-3 text-[11.5px] font-bold transition-all relative flex items-center gap-2.5"
                            :class="adminTab === tab.id ? 'text-blue-700 bg-blue-50/50' : 'text-gray-600 hover:bg-gray-50'">
                        <i :class="tab.icon" class="w-4 text-center" :class="adminTab === tab.id ? 'text-blue-600' : 'text-gray-400'"></i>
                        <span x-text="tab.name"></span>
                        <div x-show="adminTab === tab.id" class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r-md shadow-[1px_0_4px_rgba(37,99,235,0.4)]"></div>
                    </button>
                </template>
            </div>

            <!-- 우측 편집 영역 -->
            <div class="flex-1 overflow-y-auto p-4 relative hide-scrollbar">
                
                <!-- 1. 스케줄 에디터 -->
                <template x-if="adminTab === 'schedule_edit'">
                    <div class="space-y-3 max-w-[1200px] mx-auto flex flex-col h-full pb-4">
                        <div class="bg-blue-50/50 border border-blue-200 rounded-xl p-3 flex items-start gap-2.5 shadow-sm shrink-0">
                            <i class="fa-solid fa-circle-info text-blue-500 mt-0.5"></i>
                            <div class="w-full">
                                <h4 class="font-bold text-blue-800 text-[13px] mb-1">통합 스케줄 편집기</h4>
                                <p class="text-[11px] text-blue-600 leading-snug mb-2">모든 직군의 스케줄을 한눈에 확인하고 <strong class="text-blue-800">클릭만으로 빠르게 수정</strong>할 수 있습니다.<br>※ 달력 관리에서 지정한 <strong class="text-red-500">휴무일(목/일 등)은 자동으로 빨간색 '휴무'로 표기</strong>되므로 별도로 입력하지 않으셔도 됩니다.</p>
                                <div class="flex flex-wrap gap-1.5 pt-2 border-t border-blue-200/50 items-center">
                                    <span class="text-[11px] font-bold text-blue-800 mr-1"><i class="fa-solid fa-tags text-blue-500 mr-1"></i> 현재 등록된 범례:</span>
                                    <template x-for="type in (data.shiftTypes || []).filter(t => t.code !== '')" :key="'leg_show_'+type.code">
                                        <span class="text-[10px] font-bold px-1.5 py-0.5 rounded shadow-sm border border-black/5" 
                                              :class="type.color + ' ' + type.bgText" 
                                              x-text="type.code + (type.deduction > 0 ? `(-${type.deduction}차감)` : '')"></span>
                                    </template>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col flex-1 min-h-[400px] overflow-hidden admin-compact">
                            <div class="p-2 border-b border-gray-100 flex items-center justify-between bg-gray-50 shrink-0">
                                <div class="flex items-center gap-2">
                                    <div class="flex gap-1 bg-white border border-gray-200 rounded shadow-sm">
                                        <button @click="changeMonth(-1)" class="w-6 h-6 hover:bg-gray-50 flex items-center justify-center text-gray-500"><i class="fa-solid fa-chevron-left text-[9px]"></i></button>
                                        <div class="w-16 flex items-center justify-center font-black text-[12px] text-gray-800 border-x border-gray-100" x-text="`${currentYear}년 ${currentMonth}월`"></div>
                                        <button @click="changeMonth(1)" class="w-6 h-6 hover:bg-gray-50 flex items-center justify-center text-gray-500"><i class="fa-solid fa-chevron-right text-[9px]"></i></button>
                                    </div>
                                    <select x-model="selectedGroup" class="bg-white border border-gray-300 text-gray-700 text-[11px] rounded focus:ring-blue-500 px-2 py-1 font-bold shadow-sm">
                                        <option value="전체">전체 직군 보기</option>
                                        <template x-for="g in (data.groups || [])" :key="g"><option :value="g" x-text="g"></option></template>
                                    </select>
                                </div>
                                <button @click="downloadExcel('schedule')" class="px-2 py-1 text-[10px] font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 rounded hover:bg-emerald-100 flex items-center gap-1"><i class="fa-solid fa-file-excel"></i> 엑셀 백업</button>
                            </div>

                            <div class="overflow-x-auto overflow-y-auto flex-1 p-0 hide-scrollbar rounded-b-xl relative">
                                <table class="w-full text-center border-collapse table-fixed min-w-max">
                                    <thead class="bg-gray-50 sticky top-0 z-20">
                                        <tr>
                                            <th class="w-[55px] min-w-[55px] border-b border-r border-gray-200 text-gray-500 font-bold sticky-col bg-gray-50 shadow-[1px_0_0_#e2e8f0] break-keep whitespace-nowrap">직군</th>
                                            <th class="w-[55px] min-w-[55px] border-b border-r border-gray-200 text-gray-500 font-bold sticky-col bg-gray-50 shadow-[2px_0_0_#e2e8f0] break-keep whitespace-nowrap" style="left:55px;">이름</th>
                                            <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_th_'+dateObj.id">
                                                <th class="w-8 min-w-[32px] border-b border-r border-gray-200" :class="isHoliday(dateObj.dateStr) ? 'bg-red-50/30' : ''">
                                                    <div class="text-[10px] font-black" :class="dateObj.isSun ? 'text-red-500' : (dateObj.isSat ? 'text-blue-500' : 'text-gray-700')" x-text="dateObj.day"></div>
                                                </th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="emp in filteredEmployees" :key="'adm_emp_'+emp.id">
                                            <tr class="hover:bg-blue-50/30 transition-colors border-b border-gray-100">
                                                <td class="border-r border-gray-200 text-[10.5px] text-gray-600 sticky-col bg-white shadow-[1px_0_0_#e2e8f0] break-keep whitespace-nowrap" x-text="emp.group"></td>
                                                <td class="font-black text-[11.5px] text-gray-800 border-r border-gray-200 sticky-col bg-white shadow-[2px_0_0_#e2e8f0] break-keep whitespace-nowrap" style="left:55px;" x-text="emp.name"></td>
                                                
                                                <template x-for="dateObj in calendarDays.filter(d => d.dateStr !== null)" :key="'adm_td_'+emp.id+'_'+dateObj.id">
                                                    <td class="cursor-pointer hover:opacity-80 transition-opacity p-0 select-none relative h-[28px] w-8 max-w-[32px] border-r border-gray-100 overflow-hidden"
                                                        :class="isHoliday(dateObj.dateStr) ? 'bg-red-50/10' : (getCellStyle(emp.id, dateObj.dateStr).bgClass)"
                                                        @click="!isHoliday(dateObj.dateStr) && toggleScheduleCell(emp.id, dateObj.dateStr)">
                                                        <div class="w-full h-full flex items-center justify-center overflow-hidden px-0.5">
                                                            <span class="text-[9px] font-bold truncate block w-full text-center" 
                                                                  :class="isHoliday(dateObj.dateStr) ? 'text-red-500' : getCellStyle(emp.id, dateObj.dateStr).textClass"
                                                                  x-text="isHoliday(dateObj.dateStr) ? '휴무' : getCellStyle(emp.id, dateObj.dateStr).text"></span>
                                                        </div>
                                                    </td>
                                                </template>
                                            </tr>
                                        </template>
                                        <template x-if="filteredEmployees.length === 0">
                                            <tr><td :colspan="calendarDays.filter(d => d.dateStr !== null).length + 2" class="py-6 text-gray-400 text-[11px] font-medium border-b border-gray-200">등록된 직원이 없습니다.</td></tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 2. 달력 및 범례 설정 -->
                <template x-if="adminTab === 'legend'">
                    <div class="space-y-4 max-w-4xl mx-auto pb-6">
                        <!-- 범례 커스텀 -->
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                            <h3 class="font-black text-gray-800 text-[13px] mb-3 flex items-center gap-2"><i class="fa-solid fa-palette text-blue-500"></i> 스케줄 범례 커스텀 (한글 코드 인식)</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                                <template x-for="(type, idx) in (data.shiftTypes || [])" :key="'leg_'+idx">
                                    <div class="flex items-center gap-1.5 p-2 bg-gray-50 rounded-lg border border-gray-200 shadow-sm relative overflow-hidden group hover:border-blue-300 transition-colors">
                                        <input type="text" x-model="type.code" placeholder="코드" class="w-12 px-1.5 py-1.5 text-[11px] border rounded text-center font-bold focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10">
                                        <input type="text" x-model="type.label" placeholder="설명" class="flex-1 min-w-[70px] px-2 py-1.5 text-[11px] border rounded font-medium focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10">
                                        
                                        <select x-model="type.color" class="w-[72px] px-1 py-1.5 text-[11px] border rounded focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 font-bold">
                                            <option value="bg-transparent">투명(흰색)</option>
                                            <option value="bg-blue-500">파랑</option><option value="bg-emerald-500">초록</option>
                                            <option value="bg-indigo-500">남색</option><option value="bg-purple-500">보라</option>
                                            <option value="bg-amber-400">노랑</option><option value="bg-rose-500">빨강</option>
                                            <option value="bg-slate-700">검정</option><option value="bg-cyan-500">하늘</option>
                                            <option value="bg-pink-500">핑크</option>
                                        </select>
                                        <select x-model="type.bgText" class="w-[65px] px-1 py-1.5 text-[11px] border rounded focus:ring-1 focus:ring-blue-500 bg-white shadow-sm z-10 font-bold">
                                            <option value="text-white">흰글씨</option>
                                            <option value="text-gray-800">검은글씨</option>
                                        </select>
                                        
                                        <!-- 가로형 연차 차감 -->
                                        <div class="flex items-center bg-white border rounded px-1.5 py-1 w-[70px] shadow-sm z-10">
                                            <span class="text-[9px] text-gray-500 font-bold mr-1 tracking-tighter">차감</span>
                                            <input type="number" step="0.5" min="0" x-model="type.deduction" class="w-full px-0.5 py-0.5 text-[11px] text-center font-black text-red-500 outline-none">
                                        </div>
                                        <button @click="data.shiftTypes.splice(idx, 1); saveData('legend');" class="w-7 h-7 flex items-center justify-center text-red-400 hover:text-white hover:bg-red-500 bg-white border border-gray-200 rounded shadow-sm transition-colors shrink-0 z-10"><i class="fa-solid fa-trash-can text-[11px]"></i></button>
                                        
                                        <!-- 배경색 미리보기 바 -->
                                        <div class="absolute left-0 top-0 bottom-0 w-1.5 z-0" :class="type.color"></div>
                                    </div>
                                </template>
                                <button @click="data.shiftTypes.push({code:'', label:'', color:'bg-transparent', bgText:'text-gray-800', deduction: 0}); saveData('legend');" class="border-2 border-dashed border-gray-300 rounded-lg text-gray-500 text-[11px] font-bold hover:bg-gray-50 transition-colors p-2 flex items-center justify-center gap-1.5 min-h-[46px]">
                                    <i class="fa-solid fa-plus"></i> 범례 추가
                                </button>
                            </div>
                        </div>

                        <!-- 메인 달력 휴무일 관리 -->
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                            <h3 class="font-black text-gray-800 text-[13px] mb-3 flex items-center gap-2"><i class="fa-regular fa-calendar-xmark text-red-500"></i> 메인 달력 휴무일 관리 (클릭 시 토글)</h3>
                            
                            <div class="mb-3 flex items-center gap-3 bg-gray-50 p-2.5 rounded-lg border border-gray-200">
                                <span class="text-[11.5px] font-bold text-gray-700 whitespace-nowrap">기본 휴무 세팅:</span>
                                <div class="flex gap-2 flex-wrap">
                                    <template x-for="(dayName, idx) in ['일','월','화','수','목','금','토']" :key="'def_hol_'+idx">
                                        <label class="flex items-center gap-1.5 cursor-pointer bg-white px-2 py-1 rounded shadow-sm border border-gray-200 hover:border-blue-300 transition-colors">
                                            <input type="checkbox" :value="idx.toString()" x-model="data.defaultHolidays" @change="saveData('legend')" class="w-3.5 h-3.5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                                            <span class="text-[11px] font-bold" :class="idx===0 ? 'text-red-500' : (idx===6 ? 'text-blue-500' : 'text-gray-700')" x-text="dayName + '요일'"></span>
                                        </label>
                                    </template>
                                </div>
                                <span class="text-[10px] text-gray-400 ml-auto hidden sm:block">(체크 시 해당 요일은 매월 기본 휴무)</span>
                            </div>

                            <div class="border border-gray-200 rounded-lg overflow-hidden bg-white">
                                <div class="bg-white p-2 border-b border-gray-200 flex items-center justify-between">
                                    <div class="font-black text-blue-800 text-[12px] pl-2" x-text="`${currentYear}년 ${currentMonth}월 상세 세팅`"></div>
                                    <div class="flex gap-1">
                                        <button @click="changeMonth(-1)" class="w-6 h-6 rounded bg-gray-50 border border-gray-200 hover:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-chevron-left text-[9px]"></i></button>
                                        <button @click="changeMonth(1)" class="w-6 h-6 rounded bg-gray-50 border border-gray-200 hover:bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-chevron-right text-[9px]"></i></button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-7 text-center">
                                    <template x-for="(day, idx) in ['일','월','화','수','목','금','토']" :key="'cal_hh_'+idx">
                                        <div class="py-1.5 font-bold text-[11px] border-b border-r border-gray-100 bg-gray-50" :class="idx===0 ? 'text-red-500' : (idx===6 ? 'text-blue-500' : 'text-gray-700')" x-text="day"></div>
                                    </template>
                                    <template x-for="dateObj in calendarDays" :key="'cal_dd_'+dateObj.id">
                                        <div class="h-[44px] p-1 border-b border-r border-gray-100 flex flex-col items-center justify-center cursor-pointer transition-colors"
                                             :class="!dateObj.dateStr ? 'bg-gray-50/20' : (isHoliday(dateObj.dateStr) ? 'bg-red-50/20 hover:bg-red-50' : 'bg-white hover:bg-gray-50')"
                                             @click="dateObj.dateStr && toggleHoliday(dateObj.dateStr)">
                                            <template x-if="dateObj.dateStr">
                                                <div class="w-full flex flex-col items-center">
                                                    <span class="text-[12px] font-black" :class="isHoliday(dateObj.dateStr) ? 'text-red-500' : (dateObj.isSun ? 'text-red-500' : (dateObj.isSat ? 'text-blue-500' : 'text-gray-800'))" x-text="dateObj.day"></span>
                                                    <span class="text-[9px] font-bold mt-0.5 px-1.5 py-0.5 rounded-sm" :class="isHoliday(dateObj.dateStr) ? 'bg-red-500 text-white shadow-sm' : 'bg-gray-100 text-gray-400'" x-text="isHoliday(dateObj.dateStr) ? '휴무' : '정상'"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- 3. 직원/연차 관리 -->
                <template x-if="adminTab === 'emp'">
                    <div class="space-y-3 max-w-5xl mx-auto flex flex-col h-full pb-4">
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 shrink-0">
                            <div class="flex items-center justify-between mb-3">
                                <h3 class="font-black text-gray-800 text-[13px] flex items-center gap-2"><i class="fa-solid fa-user-plus text-green-500"></i> 직원 및 연차 통합 관리</h3>
                                <!-- 일괄 기준 토글 -->
                                <div class="flex bg-gray-100 p-0.5 rounded-lg border border-gray-200 shadow-inner">
                                    <button @click="data.leaveStandard = 'join'; saveData('emp')" class="px-3 py-1.5 text-[11px] font-bold rounded-md transition-all" :class="data.leaveStandard === 'join' ? 'bg-white text-blue-600 shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-700'">입사일 기준</button>
                                    <button @click="data.leaveStandard = 'fiscal'; saveData('emp')" class="px-3 py-1.5 text-[11px] font-bold rounded-md transition-all" :class="data.leaveStandard === 'fiscal' ? 'bg-white text-blue-600 shadow-sm border border-gray-200' : 'text-gray-500 hover:text-gray-700'">회계 기준</button>
                                </div>
                            </div>

                            <div class="flex items-center gap-2 mb-3 bg-gray-50 p-2.5 rounded-lg border border-gray-200 flex-wrap shadow-sm">
                                <span class="text-[11px] font-bold text-gray-600 min-w-max mr-1">직군 목록:</span>
                                <template x-for="(g, idx) in (data.groups || [])" :key="'g_edit_'+idx">
                                    <span class="inline-flex items-center gap-1 px-2 py-1 bg-white border border-gray-300 rounded text-[10.5px] font-bold text-gray-700 shadow-sm">
                                        <span x-text="g"></span>
                                        <button @click="data.groups.splice(idx,1); saveData('emp');" class="text-red-400 hover:text-red-600 ml-1"><i class="fa-solid fa-xmark"></i></button>
                                    </span>
                                </template>
                                <div class="flex items-center ml-2">
                                    <input type="text" x-model="newGroup" placeholder="새 직군" class="w-20 px-2 py-1 text-[11px] border border-gray-300 rounded-l focus:ring-1 focus:ring-blue-500 outline-none bg-white" @keydown.enter="addGroup">
                                    <button @click="addGroup" class="px-2 py-1 bg-gray-600 text-white text-[11px] font-bold rounded-r hover:bg-gray-700">추가</button>
                                </div>
                            </div>
                            
                            <div class="flex gap-2 items-center bg-green-50/50 p-2.5 rounded-lg border border-green-200 shadow-sm flex-wrap">
                                <span class="text-[11px] font-black text-green-800 mr-1"><i class="fa-solid fa-plus"></i> 신규직원:</span>
                                <select x-model="newEmp.group" class="w-24 px-2 py-1.5 text-[11px] border rounded focus:ring-1 focus:ring-green-500 font-bold bg-white outline-none">
                                    <option value="">직군선택</option>
                                    <template x-for="g in (data.groups || [])" :key="'g_sel_'+g"><option :value="g" x-text="g"></option></template>
                                </select>
                                <input type="text" x-model="newEmp.name" placeholder="이름" class="w-20 px-2 py-1.5 text-[11px] border rounded focus:ring-1 focus:ring-green-500 font-bold bg-white outline-none" @keydown.enter="addEmployee">

    <!-- 로그인 팝업 -->
    <div x-show="showAdminLogin" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center print-hide" x-cloak>
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xs p-7 mx-4" @click.away="showAdminLogin = false">
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><i class="fa-solid fa-lock text-white text-[22px]"></i></div>

    <!-- 스크립트 영역: Firebase 동적 임포트 및 시스템 로직 완벽 제어 -->
    <script>
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dain-portal-master';
        const fbConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "dain-portal-test", databaseURL: "https://dain-portal-test.firebaseio.com" };
        
        let app, db, auth, isDbConnected = false;
        let doc, setDoc, updateDoc;

        window.portalApp = function () {
            return {
                isAdminMode: false, showAdminLogin: false, adminPwdInput: '',
                activeMenu: 'main', adminTab: 'schedule_edit',
                currentYear: new Date().getFullYear(), currentMonth: new Date().getMonth() + 1,
                calendarDays: [], selectedGroup: '전체',
                openQaModal: false, qaModalMode: 'new', newQa: { title: '', content: '', pwd: '', answer: '', attachedFile: '' },
                statDate: new Date().toISOString().slice(0,10), showChart: false,
                newGroup: '', newEmp: { group: '', name: '', joinDate: '', usedLeaves: 0 },
                newWelfare: { title: '', desc: '' }, newFile: { name: '', desc: '' },
                todayVisits: 0, totalVisits: 0, sessionId: 's_' + Date.now() + '_' + Math.random().toString(36).substring(2,9),
                
                adminTabs: [
                    { id: 'schedule_edit', name: '통합 스케줄 편집', icon: 'fa-table-cells' },
                    { id: 'legend', name: '메인 달력 관리', icon: 'fa-calendar-day' },
                    { id: 'emp', name: '직원 / 연차 관리', icon: 'fa-users' },
                    { id: 'content', name: '메인 텍스트 / 링크', icon: 'fa-pen-to-square' },
                    { id: 'info', name: '병원소개 편집', icon: 'fa-hospital' },
                    { id: 'welfare', name: '복리후생 편집', icon: 'fa-gift' },
                    { id: 'files', name: '자료실 / OJT', icon: 'fa-folder-open' },
                    { id: 'qa', name: '조회 통계 / Q&A', icon: 'fa-chart-pie' }
                ],

                data: {
                    pwd: '1234', leaveStandard: 'join', defaultHolidays: ['0', '4'], customHolidays: [],
                    groups: ['치과의사', '치과위생사', '코디네이터', '경영지원'], employees: [],
                    shiftTypes: [
                        { code: '정상', label: '기본 정상', color: 'bg-transparent', bgText: 'text-gray-800', deduction: 0 },
                        { code: 'A', label: 'A조(09:00~18:00)', color: 'bg-blue-500', bgText: 'text-white', deduction: 0 },
                        { code: 'B', label: 'B조(11:00~20:00)', color: 'bg-emerald-500', bgText: 'text-white', deduction: 0 },
                        { code: 'C', label: 'C조(13:00~22:00)', color: 'bg-indigo-500', bgText: 'text-white', deduction: 0 },
                        { code: '연차', label: '종일 연차', color: 'bg-purple-500', bgText: 'text-white', deduction: 1 },
                        { code: '반차', label: '반차(0.5)', color: 'bg-amber-400', bgText: 'text-white', deduction: 0.5 }
                    ],
                    schedules: {},
                    content: { 
                        mainTitle: "다인치과 임직원 여러분\n환영합니다.", 
                        subTitle: "다인치과의 비전과 사내 규정,\n스케줄 및 다양한 정보를 확인하세요.", 
                        shortcuts: [
                            { name: "공식 홈페이지", url: "https://www.ndaindental.co.kr/" },
                            { name: "공식 블로그", url: "https://blog.naver.com/nndain" }
                        ],
                        latestUpdateText: "", latestUpdateDate: "" 
                    },
                    files: [],
                    info: { director: "허영준", tel: "02-952-2275", address: "서울특별시 노원구 노해로 507 와우쇼핑몰 5층", way: "4호선 노원역 1번 출구 도보 3분\n7호선 노원역 4번 출구 도보 5분", v1: "자연치아 살리기\n우선 원칙", v2: "환자 중심의\n맞춤형 진료", v3: "끊임없는 연구와\n의료진 교육" },
                    welfares: [], qaList: []
                },

                async init() {
                    try {
                        this.loadLocalData();
                        this.generateCalendar();
                        
                        // Firebase Dynamic Import 
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const firestore = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        
                        const { getFirestore, onSnapshot, doc: fbDoc, setDoc: fbSetDoc, updateDoc: fbUpdateDoc, increment } = firestore;
                        doc = fbDoc; setDoc = fbSetDoc; updateDoc = fbUpdateDoc;

                        app = initializeApp(fbConfig);
                        auth = getAuth(app);
                        db = getFirestore(app);

                        await signInAnonymously(auth);
                        isDbConnected = true;

                        // 3중 동기화: 실시간 데이터 구독
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v2');
                        onSnapshot(docRef, (snapshot) => {
                            if (snapshot.exists()) {
                                this.mergeData(snapshot.data());
                                this.generateCalendar(); 
                            }
                        }, (error) => { console.warn("Firebase Sync Error:", error); });

                        this.trackVisitRealtime(increment);

                    } catch (e) { 
                        console.error("Init Core Error:", e);
                        // Firebase 실패 시 로컬 트래킹 작동
                        this.trackVisitLocal();
                    }

                    window.addEventListener('storage', (e) => {
                        if (e.key === 'ndain_portal_master_v2') { this.loadLocalData(); this.generateCalendar(); }
                    });
                },

                mergeData(source) {
                    if(!source) return;
                    // Deep Merge (백화 현상 영구 방지)
                    this.data = { ...this.data, ...source };
                    this.data.content = { ...(this.data.content || {}), ...(source.content || {}) };
                    this.data.info = { ...(this.data.info || {}), ...(source.info || {}) };
                    
                    if(!this.data.leaveStandard) this.data.leaveStandard = 'join';
                    if(!this.data.employees) this.data.employees = [];
                    if(!this.data.shiftTypes) this.data.shiftTypes = [];
                    if(!this.data.qaList) this.data.qaList = [];
                    if(!this.data.files) this.data.files = [];
                    if(!this.data.welfares) this.data.welfares = [];
                    if(!this.data.groups) this.data.groups = [];
                    if(!this.data.schedules) this.data.schedules = {};
                    if(!this.data.content.shortcuts) {
                        this.data.content.shortcuts = [];
                        if(this.data.content.btn1Name) this.data.content.shortcuts.push({name: this.data.content.btn1Name, url: this.data.content.btn1Url});
                        if(this.data.content.btn2Name) this.data.content.shortcuts.push({name: this.data.content.btn2Name, url: this.data.content.btn2Url});
                    }
                },

                loadLocalData() {
                    try {
                        let saved = localStorage.getItem('ndain_portal_master_v2');
                        if (saved) this.mergeData(JSON.parse(saved));
                    } catch(e) { console.error("Local Load Error:", e); }
                },

                // 클릭 즉시 반응형 저장을 위한 Silent 모드 추가
                async saveDataSilent(context = null) {
                    if(context) this.updateAlertMessage(context);
                    
                    let pureData = JSON.parse(JSON.stringify(this.data));
                    localStorage.setItem('ndain_portal_master_v2', JSON.stringify(pureData));
                    
                    if(isDbConnected) {
                        try {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v2');
                            await setDoc(docRef, pureData);
                        } catch(e) {}
                    }
                },

                async saveData(context = null) {
                    if(context) this.updateAlertMessage(context);
                    else this.updateAlertMessage(this.adminTab); // 전체저장 시 현재 탭 기준
                    
                    let pureData = JSON.parse(JSON.stringify(this.data));
                    localStorage.setItem('ndain_portal_master_v2', JSON.stringify(pureData));
                    
                    if(isDbConnected) {
                        try {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'masterData', 'v2');
                            await setDoc(docRef, pureData);
                        } catch(e) { console.warn("DB Save error:", e); }
                    }
                    Swal.fire({ title: '저장 완료', text: '전체 시스템에 실시간 반영되었습니다.', icon: 'success', timer: 1200, showConfirmButton: false });
                },

                updateAlertMessage(context) {
                    let now = new Date();
                    this.data.content.latestUpdateDate = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    
                    const map = { 'schedule_edit': '통합 스케줄', 'legend': '달력/범례', 'emp': '직원/연차', 'content': '메인 텍스트 및 버튼', 'info': '병원 소개', 'welfare': '복리후생', 'files': '사내자료/OJT', 'qa': 'Q&A 게시판' };
                    let targetName = map[context] || '시스템';
                    this.data.content.latestUpdateText = `[업데이트] 관리자가 '${targetName}' 내역을 최신으로 업데이트했습니다.`;
                },

                async trackVisitRealtime(incrementFn) {
                    let today = new Date().toISOString().slice(0, 10);
                    let hasVisitedToday = sessionStorage.getItem('visited_' + today);
                    
                    try {
                        const statRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', today);
                        const globalStatRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'total');
                        
                        // 실시간 구독 (화면에 즉시 반영)
                        onSnapshot(statRef, (snap) => { if (snap.exists()) this.todayVisits = snap.data().count || 0; });
                        onSnapshot(globalStatRef, (snap) => { if (snap.exists()) this.totalVisits = snap.data().count || 0; });

                        if (!hasVisitedToday) {
                            sessionStorage.setItem('visited_' + today, 'true');
                            
                            // 148 조작 완벽 제거, 오직 순수 1 증가 (Atomic)
                            await setDoc(statRef, { count: incrementFn(1) }, { merge: true });
                            await setDoc(globalStatRef, { count: incrementFn(1) }, { merge: true });
                        }
                    } catch(e) {
                        this.trackVisitLocal();
                    }
                },
                trackVisitLocal() {
                    let today = new Date().toISOString().slice(0, 10);
                    let hasVisitedToday = sessionStorage.getItem('visited_' + today);
                    let stats = JSON.parse(localStorage.getItem('ndain_stats_v2') || '{"total":0}');
                    
                    if(!stats[today]) stats[today] = { today: 0 };
                    
                    if (!hasVisitedToday) {
                        stats[today].today += 1;
                        stats.total = (stats.total || 0) + 1;
                        localStorage.setItem('ndain_stats_v2', JSON.stringify(stats));
                        sessionStorage.setItem('visited_' + today, 'true');
                    }
                    this.todayVisits = stats[today].today;
                    this.totalVisits = stats.total;
                },

                adminLogin() {
                    if (this.adminPwdInput === (this.data.pwd || '1234')) {
                        this.isAdminMode = true; this.showAdminLogin = false; this.adminPwdInput = '';
                        this.adminTab = 'schedule_edit';
                    } else { Swal.fire('실패', '비밀번호가 일치하지 않습니다.', 'error'); this.adminPwdInput = ''; }
                },
                adminLogout() { this.isAdminMode = false; this.activeMenu = 'main'; },
                changeAdminPwd() {
                    Swal.fire({ title: '비밀번호 변경', input: 'password', inputPlaceholder: '새 비밀번호 입력', showCancelButton: true, confirmButtonText: '변경' })
                    .then(res => { if(res.value) { this.data.pwd = res.value; this.saveDataSilent(); Swal.fire('성공', '변경되었습니다.', 'success'); } });
                },

                generateCalendar() {
                    let firstDay = new Date(this.currentYear, this.currentMonth - 1, 1).getDay();
                    let lastDate = new Date(this.currentYear, this.currentMonth, 0).getDate();
                    let days = [];
                    // 앞의 빈칸들(null)
                    for (let i = 0; i < firstDay; i++) days.push({ id: `e_${i}`, dateStr: null, day: '', dayName: '' });
                    
                    const dayNames = ['일','월','화','수','목','금','토'];
                    for (let i = 1; i <= lastDate; i++) {
                        let dateObj = new Date(this.currentYear, this.currentMonth - 1, i);
                        let dateStr = `${this.currentYear}-${String(this.currentMonth).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                        days.push({ id: `d_${i}`, dateStr: dateStr, day: i, dayName: dayNames[dateObj.getDay()], isSun: dateObj.getDay() === 0, isSat: dateObj.getDay() === 6 });
                    }
                    this.calendarDays = days;
                },
                changeMonth(delta) {
                    this.currentMonth += delta;
                    if (this.currentMonth > 12) { this.currentMonth = 1; this.currentYear++; } 
                    else if (this.currentMonth < 1) { this.currentMonth = 12; this.currentYear--; }
                    this.generateCalendar();
                },

                isHoliday(dateStr) {
                    if (!dateStr) return false;
                    if ((this.data.customHolidays || []).includes(dateStr)) return true;
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) return true;
                    return false;
                },
                toggleHoliday(dateStr) {
                    if(!this.data.customHolidays) this.data.customHolidays = [];
                    let idx = this.data.customHolidays.indexOf(dateStr);
                    let dayOfWeek = new Date(dateStr).getDay().toString();
                    if ((this.data.defaultHolidays || []).includes(dayOfWeek)) { Swal.fire('안내', '매주 기본 휴무 세팅에서 체크를 해제하세요.', 'info'); return; }
                    
                    if (idx > -1) this.data.customHolidays.splice(idx, 1);
                    else this.data.customHolidays.push(dateStr);
                    this.saveDataSilent('legend');
                },

                get filteredEmployees() { return this.selectedGroup === '전체' ? (this.data.employees || []) : (this.data.employees || []).filter(e => e.group === this.selectedGroup); },
                addGroup() { if(this.newGroup && !(this.data.groups||[]).includes(this.newGroup)) { this.data.groups.push(this.newGroup); this.newGroup = ''; this.saveDataSilent('emp'); } },
                addEmployee() {
                    if(!this.newEmp.group || !this.newEmp.name) { Swal.fire('알림', '직군과 이름을 입력하세요', 'warning'); return; }
                    if(!this.data.employees) this.data.employees = [];
                    this.data.employees.push({ id: 'e_' + Date.now(), ...this.newEmp });
                    this.newEmp = { group: '', name: '', joinDate: '', usedLeaves: 0 };
                    this.saveDataSilent('emp');
                },
                removeEmployee(id) { this.data.employees = (this.data.employees||[]).filter(e => e.id !== id); this.saveDataSilent('emp'); },

                calculateTotalLeaves(joinDateStr) {
                    if(!joinDateStr) return 0;
                    let jd = new Date(joinDateStr); let now = new Date();
                    if (now < jd) return 0; 
                    let yearsDiff = now.getFullYear() - jd.getFullYear();
                    if (this.data.leaveStandard === 'fiscal') {
                        if (yearsDiff === 0) {
                            let months = now.getMonth() - jd.getMonth();
                            if (now.getDate() < jd.getDate()) months--;
                            return Math.max(0, months).toFixed(1);
                        } else {
                            let daysInJoinYear = (new Date(jd.getFullYear(), 11, 31) - jd) / (1000 * 60 * 60 * 24) + 1;
                            let firstYearProrated = 15 * (daysInJoinYear / 365);
                            if (yearsDiff === 1) return firstYearProrated.toFixed(1);
                            let base = 15; let extra = Math.floor((yearsDiff - 2) / 2);
                            return Math.min(base + extra, 25).toFixed(1);
                        }
                    } else {
                        let months = yearsDiff * 12 + (now.getMonth() - jd.getMonth());
                        if (now.getDate() < jd.getDate()) months--;
                        if (months < 12) return Math.max(0, months).toFixed(1);
                        let years = Math.floor(months / 12);
                        let base = 15; let extra = Math.floor((years - 1) / 2);
                        return Math.min(base + extra, 25).toFixed(1);
                    }
                },
                calculateUsed(emp) {
                    let used = parseFloat(emp.usedLeaves || 0);
                    let currentYearStr = new Date().getFullYear().toString();
                    let todayStr = new Date().toISOString().slice(0, 10);
                    if(this.data.schedules && this.data.schedules[emp.id]) {
                        for(let date in this.data.schedules[emp.id]) {
                            if(date.startsWith(currentYearStr) && date <= todayStr) {
                                let code = this.data.schedules[emp.id][date];
                                let type = (this.data.shiftTypes||[]).find(t => t.code === code);
                                if(type && type.deduction > 0) used += parseFloat(type.deduction);
                            }
                        }
                    }
                    return used.toFixed(1);
                },
                getRemainLeaves(emp) {
                    let total = parseFloat(this.calculateTotalLeaves(emp.joinDate));
                    let used = parseFloat(this.calculateUsed(emp));
                    return (total - used).toFixed(1);
                },

                // 스케줄 즉각 반응을 위한 Deep Copy 로직
                toggleScheduleCell(empId, dateStr) {
                    if(!this.data.schedules) this.data.schedules = {};
                    if(!this.data.schedules[empId]) this.data.schedules[empId] = {};
                    
                    let currentCode = this.data.schedules[empId][dateStr] || '정상';
                    let codes = (this.data.shiftTypes || []).map(t => t.code);
                    let currentIndex = codes.indexOf(currentCode);
                    let nextIndex = (currentIndex + 1) % codes.length;
                    let nextCode = codes[nextIndex];
                    
                    if(nextCode === '정상' || nextCode === '') {
                        delete this.data.schedules[empId][dateStr];
                    } else {
                        this.data.schedules[empId][dateStr] = nextCode;
                    }
                    
                    // Alpine Reactivity 강제 트리거 (객체 재할당)
                    this.data.schedules = JSON.parse(JSON.stringify(this.data.schedules));
                    this.saveDataSilent('schedule_edit'); 
                },
                getCellStyle(empId, dateStr) {
                    let code = (this.data.schedules && this.data.schedules[empId] && this.data.schedules[empId][dateStr]) ? this.data.schedules[empId][dateStr] : '정상';
                    let type = (this.data.shiftTypes || []).find(t => t.code === code);
                    if(type && type.code !== '정상') return { text: type.code, bgClass: type.color, textClass: type.bgText };
                    return { text: '', bgClass: 'bg-transparent', textClass: 'text-gray-800' };
                },

                // 동적 바로가기 아이콘 및 컬러 매칭
                getIconClass(name) {
                    let text = name || '';
                    if (text.includes('홈페이지')) return 'fa-house';
                    if (text.includes('블로그')) return 'fa-brands fa-blogger-b';
                    if (text.includes('페이스북') || text.includes('Facebook')) return 'fa-brands fa-facebook';
                    if (text.includes('인스타')) return 'fa-brands fa-instagram';
                    if (text.includes('브런치')) return 'fa-pen-nib';
                    if (text.includes('유튜브') || text.includes('YouTube')) return 'fa-brands fa-youtube';
                    return 'fa-link';
                },
                getShortcutStyle(idx) {
                    const styles = [
                        { bg: 'bg-[#4f46e5] hover:bg-[#4338ca]', iconColor: 'text-indigo-500' }, 
                        { bg: 'bg-[#03c75a] hover:bg-[#02b351]', iconColor: 'text-green-500' }, 
                        { bg: 'bg-[#ea4335] hover:bg-[#d33426]', iconColor: 'text-red-500' },    
                        { bg: 'bg-[#f59e0b] hover:bg-[#d97706]', iconColor: 'text-amber-500' },
                        { bg: 'bg-[#06b6d4] hover:bg-[#0891b2]', iconColor: 'text-cyan-500' },
                        { bg: 'bg-[#ec4899] hover:bg-[#db2777]', iconColor: 'text-pink-500' }
                    ];
                    return styles[idx % styles.length];
                },
                addShortcut() {
                    if(!this.data.content.shortcuts) this.data.content.shortcuts = [];
                    this.data.content.shortcuts.push({name: '', url: ''});
                    this.saveDataSilent('content');
                },

                uploadFile() {
                    let fileInput = document.getElementById('adminFileInput');
                    let fileName = this.newFile.name || (fileInput && fileInput.files.length > 0 ? fileInput.files[0].name : '');
                    if (fileName) {
                        let now = new Date();
                        if(!this.data.files) this.data.files = [];
                        this.data.files.unshift({ name: fileName, date: `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}` });
                        this.saveDataSilent('files');
                        this.newFile.name = '';
                        if(fileInput) fileInput.value = '';
                    } else { Swal.fire('알림', '파일을 선택하거나 제목을 입력하세요.', 'warning'); }
                },
                downloadFile(file) { Swal.fire('다운로드', `'${file.name}' 파일 열기`, 'success'); },

                getWelfareIcon(title) {
                    let t = title || '';
                    if (t.includes('의료') || t.includes('진료') || t.includes('병원')) return 'fa-notes-medical text-blue-500';
                    if (t.includes('경조') || t.includes('축하') || t.includes('조의')) return 'fa-envelope-open-text text-amber-500';
                    if (t.includes('교육') || t.includes('세미나') || t.includes('학회')) return 'fa-chalkboard-user text-emerald-500';
                    if (t.includes('휴가') || t.includes('연차') || t.includes('여행')) return 'fa-plane-departure text-purple-500';
                    if (t.includes('식사') || t.includes('간식') || t.includes('식대')) return 'fa-utensils text-orange-500';
                    if (t.includes('차량') || t.includes('교통')) return 'fa-car text-slate-500';
                    return 'fa-gift text-rose-500';
                },
                addWelfare() {
                    if(this.newWelfare.title) {
                        if(!this.data.welfares) this.data.welfares = [];
                        this.data.welfares.push({...this.newWelfare});
                        this.newWelfare = {title:'', desc:''}; this.saveDataSilent('welfare');
                    }
                },

                // Q&A 고유 번호(Sequence No) 부여 및 파일 첨부
                saveQa() {
                    if(!this.newQa.title || !this.newQa.content) { Swal.fire('알림', '제목과 내용을 입력하세요.', 'warning'); return; }
                    if(!this.data.qaList) this.data.qaList = [];
                    
                    let fileInput = document.getElementById('qaFileInput');
                    let attachedFile = (fileInput && fileInput.files.length > 0) ? fileInput.files[0].name : this.newQa.attachedFile;

                    if(this.qaModalMode === 'new') {
                        if(!this.newQa.pwd) { Swal.fire('알림', '비밀번호를 입력하세요.', 'warning'); return; }
                        let now = new Date();
                        // 삭제되어도 번호가 꼬이지 않도록 MAX 값 추출 + 1
                        let nextSeq = this.data.qaList.length > 0 ? Math.max(...this.data.qaList.map(q => q.seqNo || 0)) + 1 : 1;
                        this.data.qaList.unshift({
                            id: 'q_' + Date.now(), seqNo: nextSeq, title: this.newQa.title, content: this.newQa.content, pwd: this.newQa.pwd, answer: '', attachedFile: attachedFile,
                            date: `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`
                        });
                    } else {
                        let idx = this.data.qaList.findIndex(q => q.id === this.newQa.id);
                        if(idx > -1) {
                            this.data.qaList[idx].title = this.newQa.title; this.data.qaList[idx].content = this.newQa.content; this.data.qaList[idx].attachedFile = attachedFile;
                            if(this.isAdminMode) this.data.qaList[idx].answer = this.newQa.answer;
                        }
                    }
                    this.saveDataSilent('qa'); this.openQaModal = false;
                    if(fileInput) fileInput.value = '';
                },
                verifyQa(action, qa) {
                    if (this.isAdminMode) {
                        if(action==='delete') { this.data.qaList = this.data.qaList.filter(q => q.id !== qa.id); this.saveDataSilent('qa'); }
                        if(action==='edit') { this.qaModalMode = 'edit'; this.newQa = {...qa}; this.openQaModal = true; }
                        return;
                    }
                    Swal.fire({ title: '비밀번호 확인', input: 'password', showCancelButton: true, confirmButtonText: '확인', inputAttributes: { maxlength: 4, autocapitalize: 'off', autocorrect: 'off' }})
                    .then(res => {
                        if(res.value === qa.pwd) {
                            if(action==='delete') { this.data.qaList = this.data.qaList.filter(q => q.id !== qa.id); this.saveDataSilent('qa'); }
                            if(action==='edit') { this.qaModalMode = 'edit'; this.newQa = {...qa}; this.openQaModal = true; }
                        } else if(res.value) Swal.fire('실패', '비밀번호가 틀렸습니다.', 'error');
                    });
                },

                downloadExcel(type) {
                    if (type === 'emp' && window.XLSX) {
                        let rows = [['No.', '직군', '이름', '입사일', '총발생연차', '총사용연차', '잔여연차']];
                        (this.data.employees || []).forEach((e, idx) => {
                            rows.push([idx+1, e.group, e.name, e.joinDate, this.calculateTotalLeaves(e.joinDate), this.calculateUsed(e), this.getRemainLeaves(e)]);
                        });
                        let ws = XLSX.utils.aoa_to_sheet(rows);
                        let wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "연차현황");
                        XLSX.writeFile(wb, `직원_연차_현황_${new Date().toISOString().slice(0,10)}.xlsx`);
                    } else if (type === 'schedule' && window.XLSX) {
                        let rows = [['직군', '이름', '잔여연차']];
                        let days = this.calendarDays.filter(d => d.dateStr !== null).map(d => `${d.day}일`);
                        rows[0].push(...days);
                        
                        (this.data.employees || []).forEach(emp => {
                            let row = [emp.group, emp.name, this.getRemainLeaves(emp)];
                            this.calendarDays.filter(d => d.dateStr !== null).forEach(d => {
                                row.push(this.isHoliday(d.dateStr) ? '휴무' : this.getCellStyle(emp.id, d.dateStr).text);
                            });
                            rows.push(row);
                        });
                        let ws = XLSX.utils.aoa_to_sheet(rows);
                        let wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "통합스케줄");
                        XLSX.writeFile(wb, `통합스케줄_${this.currentYear}년_${this.currentMonth}월.xlsx`);
                    }
                },

                renderStatChart() {
                    let stats = JSON.parse(localStorage.getItem('ndain_stats_v2') || '{"total":0}');
                    let targetStats = stats[this.statDate];
                    
                    if (isDbConnected) {
                        const statRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', this.statDate);
                        const globalStatRef = doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'total');
                        
                        // Cloud fallback for charts
                        if(window.Chart) {
                            setTimeout(() => {
                                let ctx = document.getElementById('statChart');
                                if(window.myChart) window.myChart.destroy();
                                window.myChart = new Chart(ctx, {
                                    type: 'bar',
                                    data: {
                                        labels: ['해당일 방문자', '총 누적 방문자'],
                                        datasets: [{ label: '조회 수', data: [(targetStats?.today||0), stats.total], backgroundColor: ['rgba(147, 51, 234, 0.5)', 'rgba(59, 130, 246, 0.5)'], borderColor: ['rgb(147, 51, 234)', 'rgb(37, 99, 235)'], borderWidth: 1 }]
                                    },
                                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                                });
                            }, 100);
                            this.showChart = true;
                        }
                    }
                }
            }
        }
    </script>
